<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex;}

/* Slide1 */
#slide1{background:black;}
.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* Slide2 */
#slide2{
  background:#ffd6e0;
  position:relative;
  text-align:center;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:18px;
}

/* YES button uses variable scale */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  transform:scale(var(--scale,1));
}

/* NO */
#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

/* CAT */
#cat{
  width:130px;
  position:absolute;
  top:100px;
  left:50%;
  transform:translateX(-50%);
}

/* POPUP */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}
.modal.show{
  opacity:1;
  pointer-events:auto;
}
.modal-box{
  background:white;
  padding:20px 30px;
  border-radius:15px;
  font-size:18px;
}

/* GLOW (adds to scale instead of overriding it) */
.glow{
  animation:pulseGlow 1s infinite;
}
@keyframes pulseGlow{
  0%{
    transform:scale(calc(var(--scale,1) + 0.05));
    box-shadow:0 0 10px #ff4d6d;
  }
  50%{
    transform:scale(calc(var(--scale,1) + 0.2));
    box-shadow:0 0 40px #ff4d6d;
  }
  100%{
    transform:scale(calc(var(--scale,1) + 0.05));
    box-shadow:0 0 10px #ff4d6d;
  }
}

/* explode */
@keyframes explode{
  to{transform:scale(0);opacity:0;}
}
.explode{animation:explode .3s forwards;}

/* Slide3 */
#slide3{background:#ffd6e0;}
.float{
  position:absolute;
  font-size:24px;
  animation:float 6s infinite;
}
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Slide1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- Slide2 -->
<div id="slide2" class="slide">
<h1>Happy Birthday Shoon! 🎂</h1>
<img src="bdaycat.png" id="cat">
<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<!-- Slide3 -->
<div id="slide3" class="slide"></div>

<!-- POPUP -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let noClicks = 0;

/* FIXED SCALE SYSTEM */
let baseScale = 1;

/* multiply */
let multiClicks = 0;
let multiDone = false;

let popupTimer;

/* POPUP */
function pop(text){
  clearTimeout(popupTimer);
  modalText.innerText = text;
  modal.classList.add("show");

  popupTimer = setTimeout(()=>{
    modal.classList.remove("show");
  },1800);
}

/* GROW YES */
function grow(){
  baseScale += 0.15;
  yesBtn.style.setProperty('--scale', baseScale);
}

/* START */
startBtn.onclick = ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
};

/* YES */
yesBtn.onclick = ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  spawn();
};

/* NO */
noBtn.onclick = ()=>{
  noClicks++;
  grow();

  if(noClicks === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }
  else if(noClicks === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    multiply();
  }
};

/* TELEPORT */
function teleport(btn){
  btn.style.left = Math.random()*80 + "%";
  btn.style.top = Math.random()*70 + "%";
}

/* MULTIPLY */
function multiply(){
  noBtn.style.display = "none";

  multiClicks = 0;
  multiDone = false;

  for(let i=0;i<5;i++){
    let b = noBtn.cloneNode(true);
    b.style.display="block";
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*60+"%";

    slide2.appendChild(b);

    b.onclick = ()=>{
      if(multiDone) return;

      grow();
      multiClicks++;

      if(multiClicks===1) pop("3");
      else if(multiClicks===2) pop("2");
      else if(multiClicks===3) pop("1");
      else if(multiClicks===4) pop("shoon lae thu…(  •̀⤙•́ )");

      else if(multiClicks===5){
        multiDone = true;

        document.querySelectorAll("#slide2 button").forEach(btn=>{
          if(btn.innerText==="NO") btn.remove();
        });

        finalStage();
      }

      b.remove();
    };
  }
}

/* FINAL */
function finalStage(){
  let b = noBtn.cloneNode(true);
  b.style.display="block";
  slide2.appendChild(b);

  pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

  let move = setInterval(()=>{
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*60+"%";
  },1200);

  b.onclick = ()=>{
    grow();
    clearInterval(move);

    pop("fine imma pop this before u pmo ς(≖_≖ )ﾉ🔪");

    b.classList.add("explode");

    setTimeout(()=>{
      yesBtn.classList.add("glow");
    },200);
  };
}

/* SLIDE3 */
function spawn(){
  let items=["💖","✨","🍓","🐱","🐰"];

  for(let i=0;i<40;i++){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=items[Math.floor(Math.random()*items.length)];

    e.style.left=Math.random()*100+"%";
    e.style.top=Math.random()*100+"%";

    slide3.appendChild(e);
  }
}
</script>

</body>
</html>
