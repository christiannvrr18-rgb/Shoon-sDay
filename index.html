<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOONSDAY</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}
.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  animation:pulse 1.5s infinite;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* SLIDE 3 */
#slide3{
  background:#ffd6e0;
  position:relative;
}

#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

/* CARDS */
#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
}

.card{
  width:80px;
  height:80px;
  background:white;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}

/* REWARD */
#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:90%;
  max-height:90%;
  overflow:auto;
}

#rewardBody video,
#rewardBody img,
#rewardBody iframe{
  max-width:90vw;
  max-height:75vh;
}

/* POPUP */
.popup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:15px 25px;
  border-radius:12px;
}

/* CONFETTI */
.confetti{
  position:absolute;
  animation:fall 2s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>

<!-- SLIDES -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">
<div id="gameTitle">find your gifts</div>

<div id="giftWrap">
<div>open it already</div>
<div id="bigGift">🎁</div>
</div>

<div id="cardGrid"></div>
</div>

<div id="rewardBox">
<div id="rewardContent">
<div id="rewardBody"></div>
<br>
<button onclick="closeReward()">OK</button>
</div>
</div>

<script>
/* ELEMENTS */
const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");
const slide3 = document.getElementById("slide3");

const startBtn = document.getElementById("startBtn");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

const bigGift = document.getElementById("bigGift");
const cardGrid = document.getElementById("cardGrid");
const giftWrap = document.getElementById("giftWrap");
const gameTitle = document.getElementById("gameTitle");

const rewardBox = document.getElementById("rewardBox");
const rewardBody = document.getElementById("rewardBody");

const music1 = document.getElementById("music1");
const music2 = document.getElementById("music2");
const finalMusic = document.getElementById("finalMusic");

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch{}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  music1.pause(); music1.currentTime=0;
  try{ await music2.play(); }catch{}
};

/* POP */
function pop(text){
  let p=document.createElement("div");
  p.className="popup";
  p.innerText=text;
  slide2.appendChild(p);
  setTimeout(()=>p.remove(),2500);
}

/* NO */
let stage=0;
noBtn.onclick=()=>{
  stage++;
  yesBtn.style.transform=`scale(${1+stage*0.2})`;

  if(stage===1){
    pop("why no?");
    teleport(noBtn);
  }
  else if(stage===2){
    pop("try pressing 5 buttons");
    spawnClones();
  }
};

function teleport(b){
  b.style.left=Math.random()*70+10+"%";
  b.style.top=Math.random()*60+20+"%";
}

function spawnClones(){
  noBtn.style.display="none";
  let count=0;

  for(let i=0;i<5;i++){
    let c=document.createElement("button");
    c.className="choice-btn";
    c.innerText="NO";
    teleport(c);

    c.onclick=()=>{
      c.remove();
      count++;

      if(count===1)pop("3...");
      if(count===2)pop("2...");
      if(count===3)pop("1...");
      if(count===4)pop("Shoon lae thu…");

      if(count===5){
        let f=document.createElement("button");
        f.className="choice-btn";
        f.innerText="NO";
        teleport(f);
        slide2.appendChild(f);

        let int=setInterval(()=>{
          teleport(f);
        },650);

        f.onclick=()=>{
          clearInterval(int);
          f.remove();
          pop("no more NO 😈");
        };
      }
    };

    slide2.appendChild(c);
  }
}

/* GIFT */
bigGift.onclick=()=>{
  giftWrap.style.display="none";
  gameTitle.style.display="block";
  cardGrid.style.display="grid";
  generateCards();
};

function generateCards(){
  let icons=["🎆","🎇","🌌","🌠"];
  let gifts=[];

  for(let i=1;i<=11;i++) gifts.push({type:"video",src:`vid${i}.mp4`});
  for(let i=1;i<=7;i++) gifts.push({type:"image",src:`img${i}.jpg`});
  gifts.push({type:"youtube",src:"https://www.youtube.com/embed/1o00J04ThXQ"});
  gifts.push({type:"final"});

  gifts.sort(()=>Math.random()-0.5);

  cardGrid.innerHTML="";

  gifts.forEach(g=>{
    let card=document.createElement("div");
    card.className="card";
    card.innerText=icons[Math.floor(Math.random()*icons.length)];

    card.onclick=()=>{
      card.style.visibility="hidden";
      openGift(g);
    };

    cardGrid.appendChild(card);
  });
}

/* TYPE EFFECT */
function typeText(el,text){
  let i=0;
  let int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

function openGift(g){
  rewardBody.innerHTML="";
  music2.pause();

  if(g.type==="video"){
    rewardBody.innerHTML=`<video controls autoplay src="${g.src}"></video>`;
  }
  else if(g.type==="image"){
    rewardBody.innerHTML=`<img src="${g.src}">`;
  }
  else if(g.type==="youtube"){
    rewardBody.innerHTML=`<iframe src="${g.src}" allowfullscreen></iframe>`;
  }
  else{
    finalMusic.play();
    explodeConfetti();
    let div=document.createElement("div");
    rewardBody.appendChild(div);

    typeText(div,`happy birthday, i hope today is filled with so much happiness, laughter, and moments that make u genuinely smile... you deserve that.`);
  }

  rewardBox.style.display="flex";
}

function closeReward(){
  rewardBox.style.display="none";
  if(finalMusic.paused) music2.play();
}

function explodeConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerText="🎉";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}
</script>

</body>
</html>
