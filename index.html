<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

/* SLIDE 1 */
#slide1{
  background:black;
}

button{
  cursor:pointer;
}

/* START */
.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:30px;
}

#cat{
  width:380px;
  max-width:85%;
  margin-bottom:10px;
}

h1{margin:0;}
p{margin:10px;}

/* BUTTONS */
.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
}

/* YES */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  transform:scale(1);
}

/* NO */
#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

/* POPUP */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

/* YES GROW */
@keyframes pulse{
  0%{transform:scale(var(--s));}
  50%{transform:scale(calc(var(--s) + 0.15));}
  100%{transform:scale(var(--s));}
}

.grow{
  animation:pulse 0.6s infinite;
}

/* SLIDE 3 */
#slide3{
  background:#ffd6e0;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<img src="bdaycat.png" id="cat">

<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide"></div>

<!-- POPUP -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let noCount = 0;
let yesScale = 1;
let noLocked = false;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START → SLIDE 2 + HOTLINE MUSIC */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");

  try{
    await music1.play();
  }catch(e){}
};

/* YES → SLIDE 3 + MUSIC SWITCH */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;

  try{
    await music2.play();
  }catch(e){}
};

/* YES GROW FUNCTION */
function growYes(){
  yesScale += 0.2;
  yesBtn.style.transform = `scale(${yesScale})`;
}

/* NO BUTTON LOGIC (FIXED TELEPORT + LOCK) */
noBtn.onclick = ()=>{

  if(noLocked) return;
  noLocked = true;

  noCount++;
  growYes();

  if(noCount === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
  }

  if(noCount === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
  }

  if(noCount === 3){
    pop("that’s it, no more No button for you (ᗒᗣᗕ)");
  }

  /* TELEPORT EFFECT */
  setTimeout(()=>{
    let x = Math.random() * 60 + 20;
    let y = Math.random() * 60 + 20;

    noBtn.style.left = x + "%";
    noBtn.style.top = y + "%";

    noLocked = false;
  },600);
};
</script>

</body>
</html>
