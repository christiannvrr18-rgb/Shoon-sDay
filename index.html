<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
}

#yesBtn{left:40%; top:75%; background:#ff4d6d; color:white;}
#noBtn{left:55%; top:75%; background:#444; color:white;}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

.modal.show{opacity:1; pointer-events:auto;}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

/* SLIDE 3 */

#slide3{
  background:#ffd6e0;
  position:relative;
  flex-direction:column;
  overflow:hidden;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:50%;
  z-index:1;
}

#giftText{margin-bottom:10px;}
#bigGift{font-size:140px; cursor:pointer;}

#gameTitle{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-weight:bold;
}

#cardGrid{
  display:none;
  position:absolute;
  top:100px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  justify-items:center;
  z-index:5;
}

.card{
  width:70px;
  height:70px;
  background:white;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.bg-float{
  position:absolute;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.confetti{
  position:absolute;
  animation:fall 1.5s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">

<div id="gameTitle">find your gifts₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

<div id="giftWrap">
<div id="giftText">well open it already ৻( •̀ ᗜ •́ ৻)</div>
<div id="bigGift">🎁</div>
</div>

<div id="cardGrid"></div>
</div>

<div id="rewardBox">
<div id="rewardContent">
<div id="rewardBody"></div><br>
<button onclick="closeReward()">OK</button>
</div>
</div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let cardGrid = document.getElementById("cardGrid");
let rewardBox = document.getElementById("rewardBox");

function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),3500);
}

startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{await music1.play();}catch(e){}
};

yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime=0;
  try{await music2.play();}catch(e){}

  spawnFloating();
};

function spawnFloating(){
  let emojis=["🐱","🐰","🌸","🎂"];
  setInterval(()=>{
    let el=document.createElement("div");
    el.className="bg-float";
    el.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+"%";
    el.style.animationDuration=(5+Math.random()*5)+"s";
    slide3.appendChild(el);
    setTimeout(()=>el.remove(),10000);
  },500);
}

document.getElementById("bigGift").onclick=()=>{
  document.getElementById("giftWrap").style.display="none";
  cardGrid.style.display="grid";
  generateCards();
  explodeConfetti();
};

function generateCards(){

  let icons=["🎆","🎇","🌌","🌠"];

  let gifts=[

    {type:"video",src:"vid1.mp4"},
    {type:"video",src:"vid2.mp4"},
    {type:"video",src:"vid3.mp4"},
    {type:"video",src:"vid4.mp4"},
    {type:"video",src:"vid5.mp4"},
    {type:"video",src:"vid6.mp4"},
    {type:"video",src:"vid7.mp4"},
    {type:"video",src:"vid8.mp4"},
    {type:"video",src:"vid9.mp4"},
    {type:"video",src:"vid10.mp4"},
    {type:"video",src:"vid11.mp4"},

    {type:"image",src:"img1.jpg"},
    {type:"image",src:"img2.jpg"},
    {type:"image",src:"img3.jpg"},
    {type:"image",src:"img4.jpg"},
    {type:"image",src:"img5.jpg"},
    {type:"image",src:"img6.jpg"},
    {type:"image",src:"img7.jpg"},

    {type:"youtube",src:"https://www.youtube.com/embed/1o00J04ThXQ"},

    {type:"final",text:`happy birthday, i hope today is filled with so much happiness, laughter, and moments that make u genuinely smile.

you deserve that.

happy birthday again shooney. – the goat and yo boi Lloyd ᕙ( •̀ ᗜ •́ )ᕗ`}
  ];

  let final=gifts.pop();
  gifts.sort(()=>Math.random()-0.5);
  gifts.push(final);

  gifts.forEach(g=>{
    let c=document.createElement("div");
    c.className="card";
    c.innerText=icons[Math.floor(Math.random()*icons.length)];
    c.onclick=()=>openGift(g);
    cardGrid.appendChild(c);
  });
}

function openGift(g){

  let body=document.getElementById("rewardBody");
  body.innerHTML="";
  music2.pause();

  if(g.type==="video"){
    body.innerHTML=`<video controls autoplay width="300"><source src="${g.src}"></video>`;
  }

  else if(g.type==="image"){
    body.innerHTML=`<img src="${g.src}" width="300">`;
  }

  else if(g.type==="youtube"){
    body.innerHTML=`<iframe width="300" height="200" src="${g.src}" allowfullscreen></iframe>`;
  }

  else if(g.type==="final"){
    document.getElementById("finalMusic").play();
    body.innerHTML=`<div style="max-width:300px">${g.text}</div>`;
  }

  rewardBox.style.display="flex";
}

function closeReward(){
  rewardBox.style.display="none";
  let finalMusic=document.getElementById("finalMusic");
  if(finalMusic.paused){music2.play();}
  else{finalMusic.pause();}
}

function explodeConfetti(){
  for(let i=0;i<40;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerText="🎉";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1500);
  }
}
</script>

</body>
</html>
