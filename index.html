<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:20px;
}

#cat{
  width:420px;
  max-width:90%;
  margin-bottom:5px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

.grow{
  animation:pulse 0.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

#slide3{background:#ffd6e0;}
/* ===== SLIDE 3 GAME ===== */

#slide3{
  position:relative;
  overflow:hidden;
  background:#ffd6e0;
}

/* floating background */
.bg-float{
  position:absolute;
  font-size:22px;
  animation:floatUp linear infinite;
  opacity:0.6;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* title */
#gameTitle{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* big gift */
#bigGift{
  font-size:80px;
  cursor:pointer;
  z-index:5;
}

/* card grid */
#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  padding:20px;
  box-sizing:border-box;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  z-index:10;
}

/* cards */
.card{
  background:white;
  border-radius:15px;
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.1);
}

/* reward modal */
#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#rewardContent{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

#backBtn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">

  <h2 id="giftHeader">Open your gift 🎁</h2>

  <div id="bigGift">🎁</div>

  <div id="cardGame" class="hidden">
    <h3 id="progress">Gifts found: 0/10</h3>
    <div id="cardContainer"></div>
  </div>

  <div id="viewer" class="hidden">
    <div id="viewerContent"></div>
    <button id="backBtn">Back</button>
  </div>

</div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

/* STATE */
let stage = 0;
let yesScale = 1;

let clones = [];
let clickCount = 0;
let finalBtn = null;
let moving = false;
let moveInterval = null;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;
  try{ await music2.play(); }catch(e){}
};

/* YES GROW */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

/* TELEPORT */
function teleport(btn){
  btn.style.left = (Math.random()*70 + 10) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

/* SPAWN CLONES */
function spawnClones(){

  noBtn.style.display = "none";
  clones = [];
  clickCount = 0;

  for(let i=0;i<5;i++){

    let c = document.createElement("button");
    c.className = "choice-btn";
    c.innerText = "NO";

    teleport(c);

    c.onclick = ()=>handleCloneClick(c);

    slide2.appendChild(c);
    clones.push(c);
  }
}

/* HANDLE CLONE CLICK */
function handleCloneClick(btn){

  if(moving) return;

  btn.remove();
  clones = clones.filter(b=>b!==btn);

  clickCount++;

  /* COUNTDOWN */
  if(clickCount === 1) pop("3...");
  if(clickCount === 2) pop("2...");
  if(clickCount === 3) pop("1...");

  /* 4TH CLICK → NAME */
  if(clickCount === 4){
    pop("Shoon lae thu…( •̀⤙•́ )");
  }

  /* 5TH CLICK → FINAL */
  if(clickCount === 5){

    finalBtn = btn; // last clicked one becomes final (even if removed visually)

    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

    /* CREATE FINAL BUTTON */
    let newBtn = document.createElement("button");
    newBtn.className = "choice-btn";
    newBtn.innerText = "NO";

    teleport(newBtn);
    slide2.appendChild(newBtn);

    startMoving(newBtn);
  }
}

/* FINAL MOVING BUTTON */
function startMoving(btn){

  moving = true;

  moveInterval = setInterval(()=>{

    let currentLeft = parseFloat(btn.style.left) || 50;
    let currentTop = parseFloat(btn.style.top) || 50;

    /* SMALLER MOVEMENT RANGE */
    let newLeft = currentLeft + (Math.random()*20 - 10);
    let newTop = currentTop + (Math.random()*20 - 10);

    /* KEEP INSIDE SCREEN */
    newLeft = Math.max(10, Math.min(80, newLeft));
    newTop = Math.max(20, Math.min(80, newTop));

    btn.style.left = newLeft + "%";
    btn.style.top = newTop + "%";

  },1200); // 👈 FASTER

  btn.onclick = ()=>{
    clearInterval(moveInterval);

    pop("that’s it, no more No button for you (ᗒᗣᗕ)");

    btn.remove();

    yesBtn.classList.add("grow");
  };
}

/* MAIN NO */
noBtn.onclick = ()=>{

  growYes();
  stage++;

  if(stage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(stage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    spawnClones(); // ✅ CORRECT TIMING
  }
};
/* ===== SLIDE 3 LOGIC ===== */

let bigGift = document.getElementById("bigGift");
let cardGrid = document.getElementById("cardGrid");
let rewardBox = document.getElementById("rewardBox");
let rewardText = document.getElementById("rewardText");
let backBtn = document.getElementById("backBtn");

/* FLOATING BACKGROUND */
function spawnFloating(){

  let emojis = ["🐱","🐰","🌸","🌷","🌹","🎂"];

  setInterval(()=>{

    let el = document.createElement("div");
    el.className = "bg-float";
    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    el.style.left = Math.random()*100 + "%";
    el.style.animationDuration = (5 + Math.random()*5) + "s";

    slide3.appendChild(el);

    setTimeout(()=>el.remove(),10000);

  },500);
}

/* OPEN BIG GIFT */
bigGift.onclick = ()=>{

  bigGift.style.display = "none";
  cardGrid.style.display = "grid";

  generateCards();
};

/* GENERATE CARDS */
function generateCards(){

  let icons = ["🎆","🎇","🌌","🌠"];

  let gifts = [
    "Bartholomew & Pompompurin 🐶🐰",
    "Good morning message ☀️",
    "Voice message 🎤",
    "A love note 💌",
    "A surprise message 😳",
    "A compliment 💖",
    "A memory 🌙",
    "A future promise ✨",
    "A hug 🤗",
    "A kiss 😚"
  ];

  let fake = [
    "meme 😂","meme 😂","meme 😂","meme 😂","meme 😂",
    "meme 😂","meme 😂","meme 😂","meme 😂","meme 😂"
  ];

  let all = [...gifts, ...fake];

  all.sort(()=>Math.random()-0.5);

  cardGrid.innerHTML = "";

  all.forEach(text=>{

    let card = document.createElement("div");
    card.className = "card";
    card.innerText = icons[Math.floor(Math.random()*icons.length)];

    card.onclick = ()=>{

      rewardText.innerText = text;
      rewardBox.style.display = "flex";
    };

    cardGrid.appendChild(card);
  });
}

/* BACK BUTTON */
backBtn.onclick = ()=>{
  rewardBox.style.display = "none";
};

/* START FLOAT WHEN ENTERING SLIDE 3 */
yesBtn.addEventListener("click",()=>{
  spawnFloating();
});
</script>

</body>
</html>
