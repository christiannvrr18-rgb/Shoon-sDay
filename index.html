<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* SLIDES */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{display:flex;}

/* SLIDE 1 */
#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  position:relative;
  text-align:center;
  overflow:hidden;
}

/* CAT (RIGHT ABOVE TITLE) */
#cat{
  width:360px;
  max-width:85%;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:1;
}

/* TITLE (CLOSE UNDER CAT) */
#slide2 h1{
  margin-top:220px;
  position:relative;
  z-index:2;
}

/* BUTTON BASE */
.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:18px;
  z-index:5; /* IMPORTANT FIX so it's never behind cat */
}

/* YES BUTTON (FIXED GROW + GLOW) */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  transform:scale(1);
  transition:transform 0.2s ease;
}

/* NO BUTTON */
#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

/* POPUP */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px 30px;
  border-radius:15px;
  font-size:18px;
}

/* YES GLOW + PULSE (REAL FIX) */
.glow{
  animation:pulse 0.8s infinite;
}

@keyframes pulse{
  0%{transform:scale(var(--scale));}
  50%{transform:scale(calc(var(--scale) + 0.15));}
  100%{transform:scale(var(--scale));}
}

/* EXPLODE */
@keyframes explode{
  to{transform:scale(0);opacity:0;}
}
.explode{animation:explode .3s forwards;}

/* SLIDE 3 */
#slide3{background:#ffd6e0;}

.float{
  position:absolute;
  font-size:24px;
  animation:float 6s infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="bgMusic" src="minmhamin.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>

<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide"></div>

<!-- POPUP -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let startBtn = document.getElementById("startBtn");
let bgMusic = document.getElementById("bgMusic");

let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let noClicks = 0;
let scale = 1;

let multiClicks = 0;
let multiDone = false;

let popupTimer;

/* POPUP */
function pop(text){
  clearTimeout(popupTimer);
  modalText.innerText = text;
  modal.classList.add("show");

  popupTimer = setTimeout(()=>{
    modal.classList.remove("show");
  },1800);
}

/* YES GROW FIX */
function grow(){
  scale += 0.18;
  yesBtn.style.setProperty('--scale', scale);
  yesBtn.style.transform = `scale(${scale})`;
}

/* START MUSIC */
startBtn.onclick = ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  bgMusic.play();
};

/* YES */
yesBtn.onclick = ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  spawn();
};

/* NO */
noBtn.onclick = ()=>{
  noClicks++;
  grow();

  if(noClicks===1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    move(noBtn);
  }
  else if(noClicks===2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    multiply();
  }
};

/* MOVE */
function move(btn){
  btn.style.left=Math.random()*70+"%";
  btn.style.top=Math.random()*70+"%";
}

/* MULTIPLY */
function multiply(){
  noBtn.style.display="none";

  multiClicks=0;
  multiDone=false;

  for(let i=0;i<5;i++){
    let b=noBtn.cloneNode(true);
    b.style.display="block";
    b.style.left=Math.random()*70+"%";
    b.style.top=Math.random()*60+"%";
    b.style.zIndex=5;

    slide2.appendChild(b);

    b.onclick=()=>{
      if(multiDone) return;

      grow();
      multiClicks++;

      if(multiClicks===1) pop("3");
      else if(multiClicks===2) pop("2");
      else if(multiClicks===3) pop("1");
      else if(multiClicks===4) pop("almost there ( •̀⤙•́ )");

      else if(multiClicks===5){
        multiDone=true;

        document.querySelectorAll("#slide2 button").forEach(btn=>{
          if(btn.innerText==="NO") btn.remove();
        });

        finalStage();
      }

      b.remove();
    };
  }
}

/* FINAL */
function finalStage(){
  let b=noBtn.cloneNode(true);
  b.style.display="block";
  b.style.zIndex=6;
  slide2.appendChild(b);

  pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

  let move=setInterval(()=>{
    b.style.left=Math.random()*70+"%";
    b.style.top=Math.random()*60+"%";
  },900);

  b.onclick=()=>{
    grow();
    clearInterval(move);

    pop("that’s it, no more No button for you  (ᗒᗣᗕ)");

    b.classList.add("explode");

    setTimeout(()=>{
      yesBtn.classList.add("glow");
    },200);
  };
}

/* SLIDE 3 */
function spawn(){
  let items=["💖","✨","🍓","🐱","🐰"];

  for(let i=0;i<40;i++){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=items[Math.floor(Math.random()*items.length)];
    e.style.left=Math.random()*100+"%";
    e.style.top=Math.random()*100+"%";
    slide3.appendChild(e);
  }
}
</script>

</body>
</html>
