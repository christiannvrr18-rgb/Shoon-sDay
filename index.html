<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOONSDAY</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}
.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
  margin-bottom:10px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

/* YES glow */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

#noBtn{background:#444;color:white;left:55%;top:75%;}

/* SLIDE 3 */
#slide3{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
}

#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

/* CARD FLIP */
#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
}

.card{
  width:80px;
  height:80px;
  perspective:600px;
  cursor:pointer;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.card.flip .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
}

.front{
  background:white;
  font-size:30px;
}

.back{
  background:#ffccd5;
  transform:rotateY(180deg);
}

/* REWARD */
#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:90%;
  max-height:90%;
  overflow:auto;
}

#rewardBody video,
#rewardBody img,
#rewardBody iframe{
  max-width:90vw;
  max-height:75vh;
}

/* POPUP CENTER */
.popup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:15px 25px;
  border-radius:12px;
  font-size:18px;
  z-index:9999;
}

/* CONFETTI */
.confetti{
  position:absolute;
  animation:fall 2s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
<div id="gameTitle">find your gifts</div>

<div id="giftWrap">
<div>open it already</div>
<div id="bigGift">🎁</div>
</div>

<div id="cardGrid"></div>
</div>

<!-- REWARD -->
<div id="rewardBox">
<div id="rewardContent">
<div id="rewardBody"></div>
<br>
<button onclick="closeReward()">OK</button>
</div>
</div>

<script>
let music1=music1, music2=music2, finalMusic=finalMusic;
let stage=0, clickCount=0, moving=false;

/* START */
startBtn.onclick=async()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
try{await music1.play();}catch{}
};

/* YES */
yesBtn.onclick=async()=>{
slide2.classList.remove("active");
slide3.classList.add("active");
music1.pause();
music2.play();
};

/* POPUP */
function pop(t){
let p=document.createElement("div");
p.className="popup";
p.innerText=t;
slide2.appendChild(p);
setTimeout(()=>p.remove(),2500);
}

/* NO GAME */
noBtn.onclick=()=>{
stage++;
yesBtn.style.transform=`scale(${1+stage*0.2})`;

if(stage===1){
pop("why no?");
teleport(noBtn);
}else if(stage===2){
pop("try pressing 5 buttons then");
spawnClones();
}
};

function teleport(b){
b.style.left=Math.random()*70+10+"%";
b.style.top=Math.random()*60+20+"%";
}

function spawnClones(){
noBtn.style.display="none";
clickCount=0;

for(let i=0;i<5;i++){
let c=document.createElement("button");
c.className="choice-btn";
c.innerText="NO";
teleport(c);
c.onclick=()=>handleClone(c);
slide2.appendChild(c);
}
}

function handleClone(b){
b.remove();
clickCount++;

if(clickCount===1)pop("3...");
if(clickCount===2)pop("2...");
if(clickCount===3)pop("1...");
if(clickCount===4)pop("Shoon lae thu…");

if(clickCount===5){
let f=document.createElement("button");
f.className="choice-btn";
f.innerText="NO";
teleport(f);
slide2.appendChild(f);

let int=setInterval(()=>{
f.style.left=Math.random()*70+10+"%";
f.style.top=Math.random()*60+20+"%";
},650);

f.onclick=()=>{
clearInterval(int);
pop("no more NO 😈");
f.remove();
};
}
}

/* GIFT */
bigGift.onclick=()=>{
giftWrap.style.display="none";
gameTitle.style.display="block";
cardGrid.style.display="grid";
generateCards();
};

function generateCards(){
let icons=["🎆","🎇","🌌","🌠"];
let gifts=[];

for(let i=1;i<=11;i++)gifts.push({type:"video",src:`vid${i}.mp4`});
for(let i=1;i<=7;i++)gifts.push({type:"image",src:`img${i}.jpg`});
gifts.push({type:"youtube",src:"https://www.youtube.com/embed/1o00J04ThXQ"});
gifts.push({type:"final"});

gifts.sort(()=>Math.random()-0.5);

cardGrid.innerHTML="";

gifts.forEach(g=>{
let card=document.createElement("div");
card.className="card";

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="front";
front.innerText=icons[Math.floor(Math.random()*icons.length)];

let back=document.createElement("div");
back.className="back";
back.innerText="🎁";

inner.appendChild(front);
inner.appendChild(back);
card.appendChild(inner);

card.onclick=()=>{
card.classList.add("flip");
setTimeout(()=>openGift(g),500);
};

cardGrid.appendChild(card);
});
}

/* TYPEWRITER */
function typeText(el,text){
let i=0;
let int=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(int);
},15);
}

function openGift(g){
let body=document.getElementById("rewardBody");
body.innerHTML="";
music2.pause();

if(g.type==="video"){
body.innerHTML=`<video controls autoplay src="${g.src}"></video>`;
}
else if(g.type==="image"){
body.innerHTML=`<img src="${g.src}">`;
}
else if(g.type==="youtube"){
body.innerHTML=`<iframe src="${g.src}" allowfullscreen></iframe>`;
}
else{
finalMusic.play();
explodeConfetti();
let div=document.createElement("div");
div.style.textAlign="left";
div.style.lineHeight="1.5";
body.appendChild(div);

typeText(div,`happy birthday, i hope today is filled with so much happiness, laughter, and moments that make u genuinely smile...`);
}

rewardBox.style.display="flex";
}

function closeReward(){
rewardBox.style.display="none";
if(finalMusic.paused) music2.play();
}

/* CONFETTI */
function explodeConfetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.innerText="🎉";
c.style.left=Math.random()*100+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}
</script>

</body>
</html>
