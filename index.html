<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* === SLIDES === */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* === SLIDE 1 (BLACK + RED BUTTON) === */
#slide1{
  background:black;
}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 20px red;
  transform:scale(1);
  transition:0.2s;
}

.start-btn:hover{
  transform:scale(1.1);
}

/* === SLIDE 2 === */
#slide2{
  background:#ffd6e0;
  text-align:center;
}

h1{
  font-size:50px;
  margin-bottom:10px;
}

p{
  font-size:22px;
}

/* === BUTTONS === */
.choice-btn{
  padding:15px 30px;
  font-size:20px;
  margin:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  position:relative;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  transition:0.3s;
}

#noBtn{
  background:#555;
  color:white;
  position:absolute;
}

/* === POPUP TEXT === */
.popup{
  position:absolute;
  top:65%;
  font-size:22px;
  color:#8b0033;
}

/* === GLOW EFFECT === */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ box-shadow:0 0 10px #ff4d6d; }
  50%{ box-shadow:0 0 30px #ff4d6d; }
  100%{ box-shadow:0 0 10px #ff4d6d; }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music">
  <source src="birthday.mp3">
</audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <button class="start-btn" onclick="startExperience()">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
  <p>i have presents for you, want to open?</p>

  <div>
    <button id="yesBtn" class="choice-btn" onclick="yesPressed()">YES</button>
    <button id="noBtn" class="choice-btn" onclick="noPressed()">NO</button>
  </div>

  <div id="popup" class="popup"></div>
</div>

<script>
let slide1=document.getElementById("slide1");
let slide2=document.getElementById("slide2");
let music=document.getElementById("music");

let noCount=0;
let yesBtn=document.getElementById("yesBtn");
let noBtn=document.getElementById("noBtn");
let popup=document.getElementById("popup");

/* === START === */
function startExperience(){
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();
  moveNo(); // initial position
}

/* === YES === */
function yesPressed(){
  popup.innerText="good choice 😌 (next part soon)";
}

/* === NO BUTTON LOGIC === */
function noPressed(){
  noCount++;

  if(noCount===1){
    popup.innerText="why no?૮(◞ ‸ ◟ )ა";
    scaleYes(1.5);
    moveNo();
  }
  else if(noCount===2){
    popup.innerText="i've been preparing this for 20 days(っ╥﹏╥ς)";
    scaleYes(2);
    startMovingNo();
  }
  else if(noCount===3){
    popup.innerText="yep im removing that button before you pmoς(≖_≖ )ﾉ🔪";
    noBtn.style.display="none";
    scaleYes(2.5);
    yesBtn.classList.add("glow");
  }
}

/* === MOVE NO RANDOMLY === */
function moveNo(){
  let x=Math.random()*(window.innerWidth-100);
  let y=Math.random()*(window.innerHeight-100);
  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
}

/* === CONSTANT MOVEMENT === */
let movingInterval;
function startMovingNo(){
  movingInterval=setInterval(moveNo,500);
}

/* === SCALE YES BUTTON === */
function scaleYes(mult){
  yesBtn.style.transform=`scale(${mult})`;
}
</script>

</body>
</html>
