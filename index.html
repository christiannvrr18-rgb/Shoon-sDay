<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎉</title>
<style>
body {
  margin:0; padding:0;
  height:100vh; width:100vw;
  overflow:hidden;
  background: linear-gradient(135deg, #ffe4ec, #ffcce0);
  font-family: 'Arial', sans-serif;
  position:relative;
  cursor: auto;
}

/* floating elements */
.floating {
  position:absolute;
  pointer-events:none;
  z-index:1;
  transition: all 1s ease;
}

#pom {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:250px;
  cursor:pointer;
  animation: bounce 2s infinite;
  z-index:2;
}

@keyframes bounce {
  0%,100% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-25px); }
}

#message {
  position:absolute;
  top:20%; left:50%;
  transform:translateX(-50%);
  font-size:60px;
  color:#8b0033;
  text-align:center;
  display:none;
  text-shadow: 2px 2px #fff;
}
</style>
</head>
<body>

<!-- Floating hearts / stars / notes -->
<div id="effects"></div>

<!-- Pompom center -->
<img id="pom" src="pompom.png" alt="Pompom Plushy">

<!-- Hidden birthday message -->
<div id="message">HAPPY BIRTH DAY SHOON</div>

<!-- Music -->
<audio id="song">
  <source src="minmhamin.mp3" type="audio/mpeg">
</audio>

<script>
// ===== MUSIC + POMPOM CLICK =====
let pom = document.getElementById("pom");
let song = document.getElementById("song");
let message = document.getElementById("message");
let effects = document.getElementById("effects");

pom.addEventListener("click", ()=>{
  song.play();
  message.style.display = "block";

  createEffects(); // floating hearts, stars, notes
});

// ===== FLOATING EFFECTS =====
function createEffects() {
  let icons = ["❤️","⭐","🎵","🍓","🐰"];
  setInterval(()=>{
    let icon = icons[Math.floor(Math.random()*icons.length)];
    let el = document.createElement("div");
    el.className = "floating";
    el.innerHTML = icon;
    el.style.left = Math.random()*window.innerWidth + "px";
    el.style.top = window.innerHeight + "px";
    el.style.fontSize = (20+Math.random()*30) + "px";
    effects.appendChild(el);

    // animate upwards
    let top = window.innerHeight;
    let intv = setInterval(()=>{
      top -= 2 + Math.random()*3;
      el.style.top = top + "px";
      if(top < -50) {
        el.remove();
        clearInterval(intv);
      }
    }, 20);
  }, 300);
}
</script>

</body>
</html>
