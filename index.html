<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* Slides */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{display:flex;}

/* Slide1 */
#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 25px red;
}

/* Slide2 */
#slide2{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
  text-align:center;
}

h1{font-size:45px;margin-bottom:10px;}
p{font-size:22px;}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:18px;
}

/* Buttons initial position */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:65%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:65%;
}

/* Cat */
#bdayCat{
  position:absolute;
  width:120px;
  bottom:20px;
  right:20px;
  animation:float 3s infinite ease-in-out;
  z-index:2;
}

/* Floating */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

/* Modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  z-index:9999; /* FIXED */
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px 40px;
  border-radius:15px;
  font-size:20px;
}

/* Glow */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px #ff4d6d;}
  50%{box-shadow:0 0 30px #ff4d6d;}
  100%{box-shadow:0 0 10px #ff4d6d;}
}

/* Explosion */
@keyframes explode{
  to{transform:scale(0);opacity:0;}
}
.explode{animation:explode .3s forwards;}

/* Slide3 */
#slide3{
  background:#ffd6e0;
  overflow:hidden;
}

.float{
  position:absolute;
  animation:float2 6s infinite ease-in-out;
}

@keyframes float2{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="birthday.mp3">
</audio>

<!-- Slide1 -->
<div id="slide1" class="slide active">
<button class="start-btn" id="startBtn">PRESS</button>
</div>

<!-- Slide2 -->
<div id="slide2" class="slide">
<h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
<p>i have presents for you, want to open?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

<img src="bdaycat.png" id="bdayCat">
</div>

<!-- Slide3 -->
<div id="slide3" class="slide"></div>

<!-- Modal -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let startBtn=document.getElementById("startBtn");
let slide1=document.getElementById("slide1");
let slide2=document.getElementById("slide2");
let slide3=document.getElementById("slide3");

let yesBtn=document.getElementById("yesBtn");
let noBtn=document.getElementById("noBtn");

let modal=document.getElementById("modal");
let modalText=document.getElementById("modalText");

let music=document.getElementById("music");

let noClicks=0;
let yesScale=1;
let count=5;

/* START */
startBtn.onclick=()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();
};

/* POPUP */
function pop(text){
  modalText.innerText=text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),2000);
}

/* GROW YES */
function growYes(){
  yesScale+=0.25;
  yesBtn.style.transform=`scale(${yesScale})`;
}

/* YES */
yesBtn.onclick=()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  spawnCute();
};

/* NO BUTTON */
noBtn.onclick=()=>{
  noClicks++;
  growYes();

  if(noClicks===1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(noClicks===2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    multiply();
  }
};

/* TELEPORT */
function teleport(btn){
  btn.style.left=Math.random()*80+"%";
  btn.style.top=Math.random()*80+"%";
}

/* MULTIPLY */
function multiply(){
  noBtn.style.display="none";
  count=5;

  for(let i=0;i<5;i++){
    let b=noBtn.cloneNode(true);
    b.style.display="block";

    b.onclick=()=>{
      growYes();
      count--;

      if(count>0){
        pop(count+1);
      }else{
        pop("shoon lae thu…(  •̀⤙•́ )");
        finalStage();
      }

      b.remove();
    };

    b.style.left=Math.random()*90+"%";
    b.style.top=Math.random()*90+"%";
    slide2.appendChild(b);
  }
}

/* FINAL STAGE */
function finalStage(){
  let btn1=noBtn.cloneNode(true);
  let btn2=noBtn.cloneNode(true);

  btn1.style.display="block";
  btn2.style.display="block";

  slide2.appendChild(btn1);
  slide2.appendChild(btn2);

  btn1.onclick=()=>{
    growYes();
    pop("shoon lae thu…(  •̀⤙•́ )");
    btn1.remove();
  };

  btn2.onclick=()=>{
    growYes();
    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
    move(btn2);
  };
}

/* MOVE */
function move(btn){
  let interval=setInterval(()=>{
    btn.style.left=Math.random()*90+"%";
    btn.style.top=Math.random()*90+"%";
  },1500);

  btn.onclick=()=>{
    growYes();
    clearInterval(interval);
    pop("fine imma pop this before u pmo ς(≖_≖ )ﾉ🔪");
    btn.classList.add("explode");
    yesBtn.classList.add("glow");
  };
}

/* SLIDE3 BG */
function spawnCute(){
  let items=["💖","✨","🍓","🐱","🐰"];

  for(let i=0;i<40;i++){
    let el=document.createElement("div");
    el.className="float";
    el.innerText=items[Math.floor(Math.random()*items.length)];
    el.style.left=Math.random()*100+"%";
    el.style.top=Math.random()*100+"%";
    slide3.appendChild(el);
  }
}
</script>

</body>
</html>
