<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOONSDAY</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}
.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

#yesBtn{background:#ff4d6d;color:white;left:40%;top:75%;}
#noBtn{background:#444;color:white;left:55%;top:75%;}

#slide3{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
}

#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
}

.card{
  width:80px;
  height:80px;
  background:white;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  max-width:90%;
  max-height:90%;
  overflow:auto;
}

#rewardBody video,
#rewardBody img,
#rewardBody iframe{
  max-width:90vw;
  max-height:75vh;
  border-radius:10px;
}

.popup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:15px 25px;
  border-radius:12px;
  font-size:18px;
  z-index:9999;
}

</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">
<div id="gameTitle">find your gifts₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

<div id="giftWrap">
<div>well open it already ৻(  •̀ ᗜ •́  ৻)</div>
<div id="bigGift">🎁</div>
</div>

<div id="cardGrid"></div>
</div>

<div id="rewardBox">
<div id="rewardContent">
<div id="rewardBody"></div>
<br>
<button onclick="closeReward()">OK</button>
</div>
</div>

<script>
let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");
let finalMusic = document.getElementById("finalMusic");
let rewardBox = document.getElementById("rewardBox");

let stage=0, clickCount=0, clones=[], moving=false;

/* START */
startBtn.onclick=async()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
try{await music1.play();}catch{}
};

/* YES */
yesBtn.onclick=async()=>{
slide2.classList.remove("active");
slide3.classList.add("active");
music1.pause(); music1.currentTime=0;
try{await music2.play();}catch{}
};

/* POPUP CENTER */
function pop(text){
let p=document.createElement("div");
p.className="popup";
p.innerText=text;
slide2.appendChild(p);
setTimeout(()=>p.remove(),2500);
}

/* NO LOGIC */
noBtn.onclick=()=>{
stage++;
yesBtn.style.transform=`scale(${1+stage*0.2})`;

if(stage===1){
pop("why no? ૮(◞ ‸ ◟ )ა");
teleport(noBtn);
}
else if(stage===2){
pop("try pressing 5 buttons then (¬_ ´¬ )");
spawnClones();
}
};

function teleport(btn){
btn.style.left=(Math.random()*70+10)+"%";
btn.style.top=(Math.random()*60+20)+"%";
}

function spawnClones(){
noBtn.style.display="none";
clickCount=0;

for(let i=0;i<5;i++){
let c=document.createElement("button");
c.className="choice-btn";
c.innerText="NO";
teleport(c);
c.onclick=()=>handleClone(c);
slide2.appendChild(c);
clones.push(c);
}
}

function handleClone(btn){
if(moving) return;

btn.remove();
clickCount++;

if(clickCount===1) pop("3...");
if(clickCount===2) pop("2...");
if(clickCount===3) pop("1...");
if(clickCount===4) pop("Shoon lae thu…");

if(clickCount===5){
pop("alr fine try catching it then");
let f=document.createElement("button");
f.className="choice-btn";
f.innerText="NO";
teleport(f);
slide2.appendChild(f);
startMoving(f);
}
}

function startMoving(btn){
moving=true;

let int=setInterval(()=>{
btn.style.left=(Math.random()*70+10)+"%";
btn.style.top=(Math.random()*60+20)+"%";
},650);

btn.onclick=()=>{
clearInterval(int);
pop("that’s it, no more No button for you");
btn.remove();
yesBtn.style.transform="scale(2)";
};
}

/* GIFT */
bigGift.onclick=()=>{
giftWrap.style.display="none";
gameTitle.style.display="block";
cardGrid.style.display="grid";
generateCards();
};

function generateCards(){
let icons=["🎆","🎇","🌌","🌠"];

let gifts=[];

/* 11 videos */
for(let i=1;i<=11;i++){
gifts.push({type:"video",src:`vid${i}.mp4`});
}

/* 7 images */
for(let i=1;i<=7;i++){
gifts.push({type:"image",src:`img${i}.jpg`});
}

/* youtube */
gifts.push({type:"youtube",src:"https://www.youtube.com/embed/1o00J04ThXQ"});

/* FINAL MESSAGE */
gifts.push({
type:"final",
text:`happy birthday, i hope today is filled with so much happiness, laughter, and moments that make u genuinely smile. u deserve a day where everything feels light and good, even just for a while. i hope this year brings you more peace, more growth, and more of the things you’ve been quietly wishing for. i just want u to know that you’re someone really special, not just for how you are on the outside, but for the way you carry yourself, the way you care, and the little things about you that people don’t always say out loud. i hope you never lose that part of you. take your time today, enjoy everything, and don’t stress too much. just be happy, even in the smallest ways. you deserve that. happy birthday again shoonkey. 

– the goat and yo boi Lloyd ᕙ( •̀ ᗜ •́ )ᕗ`
});

/* shuffle */
gifts.sort(()=>Math.random()-0.5);

cardGrid.innerHTML="";

gifts.forEach(g=>{
let c=document.createElement("div");
c.className="card";
c.innerText=icons[Math.floor(Math.random()*icons.length)];

c.onclick=()=>{
c.style.visibility="hidden";
openGift(g);
};

cardGrid.appendChild(c);
});
}

function openGift(g){
let body=document.getElementById("rewardBody");

music2.pause();
music2.currentTime=0;

body.innerHTML="";

if(g.type==="video"){
body.innerHTML=`<video controls autoplay>
<source src="${g.src}" type="video/mp4"></video>`;
}
else if(g.type==="image"){
body.innerHTML=`<img src="${g.src}">`;
}
else if(g.type==="youtube"){
body.innerHTML=`<iframe src="${g.src}" allowfullscreen></iframe>`;
}
else if(g.type==="final"){
finalMusic.play();
body.innerHTML=`<div style="font-size:16px;line-height:1.5;text-align:left;">${g.text}</div>`;
}

rewardBox.style.display="flex";
}

function closeReward(){
rewardBox.style.display="none";
if(finalMusic.paused){
music2.play();
}
}
</script>

</body>
</html>
