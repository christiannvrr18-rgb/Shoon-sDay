<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:20px;
}

#cat{
  width:420px;
  max-width:90%;
  margin-bottom:5px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

.grow{
  animation:pulse 0.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

#slide3{background:#ffd6e0;}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide"></div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

/* STATE */
let stage = 0;
let yesScale = 1;

let clones = [];
let clicks = 0;
let finalBtn = null;
let moving = false;
let moveInterval = null;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;
  try{ await music2.play(); }catch(e){}
};

/* YES GROW */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

/* TELEPORT */
function teleport(btn){
  btn.style.left = (Math.random()*70 + 10) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

/* SPAWN 5 BUTTONS */
function spawnClones(){

  noBtn.style.display = "none";
  clones = [];
  clicks = 0;

  for(let i=0;i<5;i++){
    let c = document.createElement("button");
    c.className = "choice-btn";
    c.innerText = "NO";

    teleport(c);

    c.onclick = ()=>handleCloneClick(c);

    slide2.appendChild(c);
    clones.push(c);
  }
}

/* HANDLE CLONE CLICK */
function handleCloneClick(btn){

  if(moving) return;

  btn.remove();
  clones = clones.filter(b=>b!==btn);
  clicks++;

  /* COUNTDOWN */
  if(clicks === 1) pop("3...");
  if(clicks === 2) pop("2...");
  if(clicks === 3) pop("1...");

  /* WHEN ONLY 1 LEFT → PREP FINAL */
  if(clones.length === 1 && !finalBtn){
    finalBtn = clones[0];

    finalBtn.onclick = ()=>{

      pop("Shoon lae thu…( •̀⤙•́ )");

      setTimeout(()=>{
        pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
        startMoving(finalBtn);
      },800);
    };
  }
}

/* FINAL MOVING BUTTON */
function startMoving(btn){

  moving = true;

  moveInterval = setInterval(()=>{
    teleport(btn);
  },700);

  btn.onclick = ()=>{
    clearInterval(moveInterval);

    pop("that’s it, no more No button for you (ᗒᗣᗕ)");

    btn.remove();

    yesBtn.classList.add("grow");
  };
}

/* MAIN NO BUTTON */
noBtn.onclick = ()=>{

  growYes();
  stage++;

  if(stage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(stage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    spawnClones(); // ✅ FIXED: happens immediately
  }
};
</script>

</body>
</html>
