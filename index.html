<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:20px;
}

#cat{
  width:420px;
  max-width:90%;
  margin-bottom:5px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

.grow{
  animation:pulse 0.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

#slide3{background:#ffd6e0;}
/* ===== SLIDE 3 GAME ===== */

#slide3{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#bigGift{
  font-size:100px;
  cursor:pointer;
  margin-top:40px;
  transition:0.3s;
}
#bigGift:hover{
  transform:scale(1.2);
}

#cardGame{
  margin-top:20px;
}

#cardContainer{
  display:grid;
  grid-template-columns:repeat(5, 70px);
  gap:15px;
  justify-content:center;
}

.card{
  width:70px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:white;
  border-radius:10px;
  cursor:pointer;
  transition:0.4s;
}

.card.flipped{
  background:#ffd6e0;
  transform:rotateY(180deg);
}

#viewer{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:15px;
  z-index:20;
  width:80%;
  max-width:300px;
}

#backBtn{
  margin-top:15px;
}

/* floating bg */
.float{
  position:absolute;
  font-size:20px;
  animation:floatUp linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.hidden{display:none;}
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">

  <h2 id="giftHeader">Open your gift 🎁</h2>

  <div id="bigGift">🎁</div>

  <div id="cardGame" class="hidden">
    <h3 id="progress">Gifts found: 0/10</h3>
    <div id="cardContainer"></div>
  </div>

  <div id="viewer" class="hidden">
    <div id="viewerContent"></div>
    <button id="backBtn">Back</button>
  </div>

</div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

/* STATE */
let stage = 0;
let yesScale = 1;

let clones = [];
let clickCount = 0;
let finalBtn = null;
let moving = false;
let moveInterval = null;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;
  try{ await music2.play(); }catch(e){}
};

/* YES GROW */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

/* TELEPORT */
function teleport(btn){
  btn.style.left = (Math.random()*70 + 10) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

/* SPAWN CLONES */
function spawnClones(){

  noBtn.style.display = "none";
  clones = [];
  clickCount = 0;

  for(let i=0;i<5;i++){

    let c = document.createElement("button");
    c.className = "choice-btn";
    c.innerText = "NO";

    teleport(c);

    c.onclick = ()=>handleCloneClick(c);

    slide2.appendChild(c);
    clones.push(c);
  }
}

/* HANDLE CLONE CLICK */
function handleCloneClick(btn){

  if(moving) return;

  btn.remove();
  clones = clones.filter(b=>b!==btn);

  clickCount++;

  /* COUNTDOWN */
  if(clickCount === 1) pop("3...");
  if(clickCount === 2) pop("2...");
  if(clickCount === 3) pop("1...");

  /* 4TH CLICK → NAME */
  if(clickCount === 4){
    pop("Shoon lae thu…( •̀⤙•́ )");
  }

  /* 5TH CLICK → FINAL */
  if(clickCount === 5){

    finalBtn = btn; // last clicked one becomes final (even if removed visually)

    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

    /* CREATE FINAL BUTTON */
    let newBtn = document.createElement("button");
    newBtn.className = "choice-btn";
    newBtn.innerText = "NO";

    teleport(newBtn);
    slide2.appendChild(newBtn);

    startMoving(newBtn);
  }
}

/* FINAL MOVING BUTTON */
function startMoving(btn){

  moving = true;

  moveInterval = setInterval(()=>{

    let currentLeft = parseFloat(btn.style.left) || 50;
    let currentTop = parseFloat(btn.style.top) || 50;

    /* SMALLER MOVEMENT RANGE */
    let newLeft = currentLeft + (Math.random()*20 - 10);
    let newTop = currentTop + (Math.random()*20 - 10);

    /* KEEP INSIDE SCREEN */
    newLeft = Math.max(10, Math.min(80, newLeft));
    newTop = Math.max(20, Math.min(80, newTop));

    btn.style.left = newLeft + "%";
    btn.style.top = newTop + "%";

  },700); // 👈 FASTER

  btn.onclick = ()=>{
    clearInterval(moveInterval);

    pop("that’s it, no more No button for you (ᗒᗣᗕ)");

    btn.remove();

    yesBtn.classList.add("grow");
  };
}

/* MAIN NO */
noBtn.onclick = ()=>{

  growYes();
  stage++;

  if(stage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(stage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    spawnClones(); // ✅ CORRECT TIMING
  }
};
/* ===== SLIDE 3 GAME ===== */

let bigGift = document.getElementById("bigGift");
let cardGame = document.getElementById("cardGame");
let cardContainer = document.getElementById("cardContainer");
let viewer = document.getElementById("viewer");
let viewerContent = document.getElementById("viewerContent");
let backBtn = document.getElementById("backBtn");
let progressText = document.getElementById("progress");

let found = 0;

let icons = ["🎆","🎇","🌌","🌠"];

let realGifts = [
"Bartholomew & Pompompurin remind me of you 🐱🐰",
"i hope you have a really good day today",
"you randomly cross my mind a lot",
"i hope you sleep peacefully tonight",
"your presence is actually comforting",
"i made something for you… 👀",
"you matter more than you think",
"i appreciate you quietly",
"you have a calm kind of beauty",
"happy birthday ❤️"
];

let fakeGifts = [
"wrong one 😛",
"try again",
"nope",
"almost 😭",
"you got scammed",
"nahhh",
"miss",
"again",
"no luck",
"not this one"
];

let allCards = [];

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function createCards(){

  allCards = [];
  found = 0;
  progressText.innerText = "Gifts found: 0/10";

  realGifts.forEach(g=>allCards.push({type:"real",content:g}));
  fakeGifts.forEach(f=>allCards.push({type:"fake",content:f}));

  shuffle(allCards);

  cardContainer.innerHTML = "";

  allCards.forEach(data=>{

    let card = document.createElement("div");
    card.className = "card";
    card.innerText = icons[Math.floor(Math.random()*icons.length)];

    card.onclick = ()=>{

      if(card.classList.contains("flipped")) return;

      card.classList.add("flipped");

      setTimeout(()=>{

        if(data.type==="real"){
          found++;
          progressText.innerText = `Gifts found: ${found}/10`;

          viewerContent.innerText = data.content;
          viewer.classList.remove("hidden");

        }else{
          pop(data.content);
        }

      },300);
    };

    cardContainer.appendChild(card);
  });
}

/* OPEN GIFT */
bigGift.onclick = ()=>{
  bigGift.style.display = "none";
  document.getElementById("giftHeader").innerText = "Find the hidden gifts 🎁";
  cardGame.classList.remove("hidden");
  createCards();
};

/* BACK */
backBtn.onclick = ()=>{
  viewer.classList.add("hidden");

  if(found===10){
    setTimeout(()=>{
      pop("you found everything… ❤️");
    },500);
  }
};

/* FLOATING BG */
function spawnFloat(){

  let emojis=["🐱","🐰","🌸","🌷","🌹","🎂"];

  let el=document.createElement("div");
  el.className="float";
  el.innerText=emojis[Math.floor(Math.random()*emojis.length)];

  el.style.left=Math.random()*100+"vw";
  el.style.animationDuration=(5+Math.random()*5)+"s";

  slide3.appendChild(el);

  setTimeout(()=>el.remove(),10000);
}

setInterval(spawnFloat,800);
</script>

</body>
</html>
