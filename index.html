<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
}

#yesBtn{background:#ff4d6d;color:white;left:40%;top:75%;}
#noBtn{background:#444;color:white;left:55%;top:75%;}

/* SLIDE 3 */

#slide3{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
}

#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

#giftText{
  margin-bottom:10px;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
}

.card{
  width:70px;
  height:70px;
  background:white;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.bg-float{
  position:absolute;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.confetti{
  position:absolute;
  animation:fall 1.8s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">
  <div id="gameTitle">find your gifts₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

  <div id="giftWrap">
    <div id="giftText">well open it already ৻(  •̀ ᗜ •́  ৻)</div>
    <div id="bigGift">🎁</div>
  </div>

  <div id="cardGrid"></div>
</div>

<div id="rewardBox">
  <div id="rewardContent">
    <div id="rewardText"></div>
    <br>
    <button onclick="closeReward()">OK</button>
  </div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

document.getElementById("startBtn").onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{await music1.play();}catch{}
};

document.getElementById("yesBtn").onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  try{await music2.play();}catch{}

  spawnFloating();
};

function spawnFloating(){
  let emojis=["🐱","🐰","🌸","🎀","🎂"];
  setInterval(()=>{
    let e=document.createElement("div");
    e.className="bg-float";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"%";
    e.style.animationDuration=(5+Math.random()*5)+"s";
    document.getElementById("slide3").appendChild(e);
    setTimeout(()=>e.remove(),10000);
  },500);
}

/* GIFT SYSTEM */

let bigGift=document.getElementById("bigGift");
let cardGrid=document.getElementById("cardGrid");
let rewardText=document.getElementById("rewardText");

bigGift.onclick=()=>{
  document.getElementById("giftWrap").style.display="none";
  document.getElementById("gameTitle").style.display="block";
  cardGrid.style.display="grid";
  generateCards();
  explodeConfetti();
};

function generateCards(){
  let icons=["🎆","🎇","🌌","🌠"];

  let gifts=[
    {type:"text",content:"Bartholomew & Pompompurin 🐱🐰"},
    {type:"text",content:"You make days softer"},
    {type:"text",content:"Sleep well tonight 🌙"},
    {type:"text",content:"I appreciate you"},
    {type:"text",content:"Happy Birthday ❤️"},

    {type:"image",content:"pic1.jpg"},
    {type:"image",content:"pic2.jpg"},
    {type:"image",content:"pic3.jpg"},
    {type:"image",content:"pic4.jpg"},
    {type:"image",content:"pic5.jpg"},

    {type:"video",content:"vid1.mp4"},
    {type:"video",content:"vid2.mp4"},
    {type:"video",content:"singing1.mp4"},
    {type:"video",content:"singing2.mp4"},

    {type:"youtube",content:"https://www.youtube.com/embed/YOUR_VIDEO_ID"},

    {type:"text",content:"You deserve everything good"},
    {type:"text",content:"I’m always here"},
    {type:"text",content:"Stay cute okay"},
    {type:"text",content:"You mean a lot to me"},
    {type:"text",content:"More memories soon ❤️"}
  ];

  gifts=gifts.sort(()=>Math.random()-0.5);

  cardGrid.innerHTML="";

  gifts.forEach(g=>{
    let c=document.createElement("div");
    c.className="card";
    c.innerText=icons[Math.floor(Math.random()*icons.length)];
    c.onclick=()=>openGift(g);
    cardGrid.appendChild(c);
  });
}

function openGift(g){
  rewardText.innerHTML="";
  music2.pause();

  if(g.type==="text"){
    rewardText.innerText=g.content;
  }
  if(g.type==="image"){
    rewardText.innerHTML=`<img src="${g.content}" style="max-width:250px;border-radius:10px;">`;
  }
  if(g.type==="video"){
    rewardText.innerHTML=`<video controls style="max-width:250px"><source src="${g.content}"></video>`;
  }
  if(g.type==="youtube"){
    rewardText.innerHTML=`<iframe width="250" height="150" src="${g.content}" frameborder="0" allowfullscreen></iframe>`;
  }

  document.getElementById("rewardBox").style.display="flex";
}

function closeReward(){
  document.getElementById("rewardBox").style.display="none";
  music2.currentTime=0;
  music2.play();
}

function explodeConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerText="🎉";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}
</script>

</body>
</html>
