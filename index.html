<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body,html{margin:0;height:100%;overflow:hidden;font-family:Arial;}
.slide{display:none;position:absolute;width:100%;height:100%;justify-content:center;align-items:center;flex-direction:column;}
.active{display:flex;}

#slide1{background:black;}
.start-btn{background:red;color:white;padding:25px 50px;font-size:24px;border:none;border-radius:15px;cursor:pointer;}

#slide2{background:#ffd6e0;position:relative;text-align:center;}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:18px;
}

#yesBtn{background:#ff4d6d;color:white;left:40%;top:75%;}
#noBtn{background:#444;color:white;left:55%;top:75%;}

#cat{
  width:120px;
  position:absolute;
  top:100px;
  left:50%;
  transform:translateX(-50%);
}

.modal{
  position:fixed;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
}
.modal.show{opacity:1;pointer-events:auto;}
.modal-box{background:white;padding:20px 30px;border-radius:15px;}

.glow{animation:pulse 1s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 10px pink;}
  50%{box-shadow:0 0 30px pink;}
  100%{box-shadow:0 0 10px pink;}
}

@keyframes explode{to{transform:scale(0);opacity:0;}}
.explode{animation:explode .3s forwards;}

#slide3{background:#ffd6e0;}
.float{position:absolute;font-size:24px;animation:float 6s infinite;}
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<h1>Happy Birthday Shoon! 🎂</h1>
<img src="bdaycat.png" id="cat">
<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide"></div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1=document.getElementById("slide1");
let slide2=document.getElementById("slide2");
let slide3=document.getElementById("slide3");

let yesBtn=document.getElementById("yesBtn");
let noBtn=document.getElementById("noBtn");

let modal=document.getElementById("modal");
let modalText=document.getElementById("modalText");

let yesScale=1;
let noClicks=0;

let multiCount=0;
let multiDone=false;

let popupTimer;

/* popup */
function pop(text){
  clearTimeout(popupTimer);
  modalText.innerText=text;
  modal.classList.add("show");

  popupTimer=setTimeout(()=>{
    modal.classList.remove("show");
  },2000);
}

/* grow */
function grow(){
  yesScale+=0.2;
  yesBtn.style.transform=`scale(${yesScale})`;
}

/* start */
startBtn.onclick=()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
};

/* yes */
yesBtn.onclick=()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  spawn();
};

/* no */
noBtn.onclick=()=>{
  noClicks++;
  grow();

  if(noClicks===1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }
  else if(noClicks===2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    teleport(noBtn);
  }
  else if(noClicks===3){
    multiply();
  }
};

/* teleport */
function teleport(btn){
  btn.style.left=Math.random()*80+"%";
  btn.style.top=Math.random()*70+"%";
}

/* multiply */
function multiply(){
  noBtn.style.display="none";
  multiCount=0;
  multiDone=false;

  for(let i=0;i<5;i++){
    let b=noBtn.cloneNode(true);
    b.style.display="block";
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*60+"%";
    slide2.appendChild(b);

    b.onclick=()=>{
      if(multiDone) return;

      grow();
      multiCount++;

      if(multiCount===1) pop("3");
      else if(multiCount===2) pop("2");
      else if(multiCount===3) pop("1");
      else if(multiCount===4){
        pop("shoon lae thu…(  •̀⤙•́ )");

        // leave ONE button only
        document.querySelectorAll("#slide2 button").forEach(btn=>{
          if(btn.innerText==="NO" && btn!==b) btn.remove();
        });
      }
      else if(multiCount===5){
        multiDone=true;

        // NOW go to final BUT WAIT for click
        final(b);
      }

      if(multiCount < 5) b.remove();
    };
  }
}

/* final */
function final(lastBtn){

  pop("press it one more time...");

  lastBtn.onclick=()=>{

    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

    let move=setInterval(()=>{
      lastBtn.style.left=Math.random()*80+"%";
      lastBtn.style.top=Math.random()*60+"%";
    },1200);

    lastBtn.onclick=()=>{
      grow();
      clearInterval(move);

      pop("fine imma pop this before u pmo ς(≖_≖ )ﾉ🔪");

      lastBtn.classList.add("explode");
      yesBtn.classList.add("glow");
    };
  };
}

/* slide3 */
function spawn(){
  let arr=["💖","✨","🍓","🐱","🐰"];
  for(let i=0;i<40;i++){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=arr[Math.floor(Math.random()*arr.length)];
    e.style.left=Math.random()*100+"%";
    e.style.top=Math.random()*100+"%";
    slide3.appendChild(e);
  }
}
</script>

</body>
</html>
