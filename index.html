<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:20px;
}

#cat{
  width:420px;
  max-width:90%;
  margin-bottom:5px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

.grow{
  animation:pulse 0.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

#slide3{background:#ffd6e0;}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide"></div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let clickStage = 0;
let yesScale = 1;

/* MULTIPLY PHASE */
let clones = [];
let countdown = 3;
let finalButton = null;
let moving = null;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;
  try{ await music2.play(); }catch(e){}
};

/* YES GROW */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

/* TELEPORT */
function teleport(btn){
  btn.style.left = (Math.random()*60 + 20) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

/* SPAWN CLONES */
function spawnClones(){
  noBtn.style.display = "none";

  for(let i=0;i<5;i++){
    let c = noBtn.cloneNode(true);
    c.removeAttribute("id");
    c.style.position = "absolute";
    teleport(c);

    c.onclick = ()=>{

      c.remove();
      clones = clones.filter(x=>x!==c);

      if(countdown > 0){
        pop(countdown + "...");
        countdown--;
      }

      if(countdown === 0 && !finalButton){
        pop("Shoon lae thu…( •̀⤙•́ )");

        /* KEEP ONE BUTTON */
        finalButton = clones[0];
        clones.forEach(btn=>{
          if(btn !== finalButton) btn.remove();
        });

        clones = [finalButton];

        setTimeout(()=>{
          pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
          startMoving(finalButton);
        },1000);
      }
    };

    slide2.appendChild(c);
    clones.push(c);
  }
}

/* FINAL MOVEMENT */
function startMoving(btn){
  moving = setInterval(()=>{
    teleport(btn);
  },900);

  btn.onclick = ()=>{
    clearInterval(moving);
    pop("that’s it, no more No button for you (ᗒᗣᗕ)");
    btn.remove();
    yesBtn.classList.add("grow");
  };
}

/* MAIN NO */
noBtn.onclick = ()=>{
  growYes();
  clickStage++;

  if(clickStage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(clickStage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    teleport(noBtn);
  }

  else if(clickStage === 3){
    spawnClones();
  }
};
</script>

</body>
</html>
