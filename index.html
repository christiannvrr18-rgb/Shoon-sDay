<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  overflow:hidden;
}

/* SLIDES */
.slide {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active {
  display:flex;
}

/* SLIDE 1 */
#slide1 {
  background:black;
}

.start-btn {
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 20px red;
}

/* SLIDE 2 */
#slide2 {
  background:#ffd6e0;
  text-align:center;
  position:relative;
  overflow:hidden;
}

h1 {
  font-size:55px;
  margin-top:40px;
}

p {
  font-size:24px;
}

/* BUTTONS */
.choice-btn {
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
  position:absolute;
}

#yesBtn {
  background:#ff4d6d;
  color:white;
}

#noBtn {
  background:#555;
  color:white;
}

/* MODAL POPUP */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:10;
}

.modal.show {
  opacity:1;
  pointer-events:auto;
}

.modal-box {
  background:white;
  padding:25px 40px;
  border-radius:15px;
  font-size:22px;
  text-align:center;
}

/* EXPLOSION */
@keyframes explode {
  0%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(2); background:red; }
  100%{ transform:scale(0); opacity:0; }
}

.explode {
  animation:explode 0.5s forwards;
}

/* GLOW */
.glow {
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0%{ box-shadow:0 0 10px #ff4d6d; }
  50%{ box-shadow:0 0 30px #ff4d6d; }
  100%{ box-shadow:0 0 10px #ff4d6d; }
}

/* Sparkles */
.sparkle {
  position:absolute;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
  animation: float 3s infinite;
  opacity:0.8;
}

@keyframes float {
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-50px); }
  100%{ transform:translateY(0px); }
}

</style>
</head>
<body>

<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <button class="start-btn" onclick="start()">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
  <p>i have presents for you, want to open?</p>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box" id="modalText"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let music = document.getElementById("music");

let yesBtn;
let noBtn;
let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let noClickCount = 0;
let moveInterval;
let multipleButtons = [];

function start() {
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();

  // create YES/NO buttons on Slide 2
  yesBtn = document.createElement("button");
  yesBtn.id="yesBtn";
  yesBtn.className="choice-btn";
  yesBtn.innerText="YES";
  yesBtn.style.left = "40%";
  yesBtn.style.top = "60%";
  yesBtn.onclick = yes;
  slide2.appendChild(yesBtn);

  noBtn = document.createElement("button");
  noBtn.id="noBtn";
  noBtn.className="choice-btn";
  noBtn.innerText="NO";
  noBtn.style.left = "55%";
  noBtn.style.top = "60%";
  noBtn.onclick = no;
  slide2.appendChild(noBtn);
}

// MODAL FUNCTION
function showModal(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>{ modal.classList.remove("show"); },2000);
}

// YES CLICK
function yes(){
  showModal("Yay! 🎉 Let's reveal the surprises 😌");
  // here you can trigger sparkles/hearts/bunnies etc
}

// NO CLICK
function no(btn){
  noClickCount++;

  if(noClickCount === 1){
    showModal("why no? ૮(◞ ‸ ◟ )ა");
    yesBtn.style.transform = "scale(5)";
    teleportNo(noBtn);
  }
  else if(noClickCount === 2){
    showModal("Let's multiply the NO buttons! ಠ_ಠ");
    multiplyNo();
  }
  else if(noClickCount === 3){
    showModal("i've been preparing this for 20 days(っ╥﹏╥ς)");
    startSliding(noBtn);
  }
  else if(noClickCount === 4){
    showModal("yep im removing that button before you pmo ς(≖_≖ )ﾉ🔪");
    explodeNo(noBtn);
  }
}

// TELEPORT
function teleportNo(btn){
  let x = Math.random()*(window.innerWidth-100);
  let y = Math.random()*(window.innerHeight-100);
  btn.style.left = x+"px";
  btn.style.top = y+"px";
}

// MULTIPLY
function multiplyNo(){
  multipleButtons = [];
  for(let i=0;i<5;i++){
    let newBtn = noBtn.cloneNode(true);
    newBtn.onclick = function(){
      let num = i+1;
      showModal(num===5?"shoon lae thu…(  •̀⤙•́  )":num+".");
      newBtn.remove();
    };
    let x = Math.random()*(window.innerWidth-100);
    let y = Math.random()*(window.innerHeight-100);
    newBtn.style.left = x+"px";
    newBtn.style.top = y+"px";
    slide2.appendChild(newBtn);
    multipleButtons.push(newBtn);
  }
  noBtn.style.display="none"; // hide original during multiply
}

// SLIDING
function startSliding(btn){
  btn.style.display="block";
  moveInterval = setInterval(()=>{
    let x = Math.random()*(window.innerWidth-120);
    let y = Math.random()*(window.innerHeight-120);
    btn.style.transition = "1.5s linear";
    btn.style.left = x+"px";
    btn.style.top = y+"px";
  },1500);
}

// EXPLODE
function explodeNo(btn){
  clearInterval(moveInterval);
  btn.classList.add("explode");
  setTimeout(()=>{ btn.remove(); },500);
  yesBtn.style.transform="scale(3)";
  yesBtn.classList.add("glow");
}

</script>
</body>
</html>
