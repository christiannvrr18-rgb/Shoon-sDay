<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{display:flex;}

/* SLIDE 1 */
#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  text-align:center;
  position:relative;
}

#cat{
  width:380px;
  margin-bottom:10px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

/* POPUP */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

/* YES GROW */
.grow{
  animation:pulse 0.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* SLIDE 3 */
#slide3{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
}

.hidden{display:none;}

/* BIG GIFT */
#bigGift{
  font-size:80px;
  cursor:pointer;
}

/* CARD GRID */
#cardGrid{
  display:grid;
  grid-template-columns:repeat(5,70px);
  gap:10px;
  margin-top:20px;
}

/* CARD */
.card{
  width:70px;
  height:90px;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card.flipped{
  background:#ff4d6d;
  color:white;
}

/* BIG CARD */
#bigCard{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#bigContent{
  background:white;
  padding:25px;
  border-radius:15px;
}

#backBtn{
  margin-top:10px;
  padding:10px 20px;
}

/* FLOATING BG */
#bgFloat{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.floatItem{
  position:absolute;
  animation:float 8s linear infinite;
  opacity:0.5;
}

@keyframes float{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<img src="bdaycat.png" id="cat">

<h1>Happy Birthday Shoon 🎂</h1>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">

<div id="bigGift">🎁</div>

<div id="gameArea" class="hidden">
<h2>Find the hidden gifts 🎁</h2>
<p id="progress">0 / 10 found</p>
<div id="cardGrid"></div>
</div>

<div id="bigCard" class="hidden">
<div id="bigContent"></div>
<button id="backBtn">Back</button>
</div>

<div id="bgFloat"></div>

</div>

<!-- POPUP -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>

/* SLIDES */
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

/* BUTTONS */
let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

/* POPUP */
let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

/* MUSIC */
let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

/* STATE */
let stage = 0;
let yesScale = 1;

/* CLONE GAME */
let clones = [];
let clicks = 0;
let moving = false;
let moveInterval = null;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{await music1.play();}catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  music1.pause();
  music2.play();
};

/* YES GROW */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

/* TELEPORT */
function teleport(btn){
  btn.style.left = (Math.random()*70 + 10) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

/* NO LOGIC */
noBtn.onclick = ()=>{
  growYes();
  stage++;

  if(stage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(stage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    spawnClones();
  }
};

/* SPAWN CLONES */
function spawnClones(){

  noBtn.style.display = "none";
  clones = [];
  clicks = 0;

  for(let i=0;i<5;i++){
    let c = document.createElement("button");
    c.className = "choice-btn";
    c.innerText = "NO";

    teleport(c);

    c.onclick = ()=>handleClone(c);

    slide2.appendChild(c);
    clones.push(c);
  }
}

/* HANDLE CLONES */
function handleClone(btn){

  if(moving) return;

  btn.remove();
  clicks++;

  if(clicks === 1) pop("3...");
  if(clicks === 2) pop("2...");
  if(clicks === 3) pop("1...");

  if(clicks === 4){
    pop("Shoon lae thu…( •̀⤙•́ )");
  }

  if(clicks === 5){
    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
    startMoving(btn);
  }
}

/* FINAL MOVE */
function startMoving(btn){

  moving = true;

  moveInterval = setInterval(()=>{
    teleport(btn);
  },1000);

  btn.onclick = ()=>{
    clearInterval(moveInterval);
    pop("that’s it, no more No button for you (ᗒᗣᗕ)");
    btn.remove();
    yesBtn.classList.add("grow");
  };
}

/* SLIDE 3 */
let bigGift = document.getElementById("bigGift");
let gameArea = document.getElementById("gameArea");
let cardGrid = document.getElementById("cardGrid");
let progress = document.getElementById("progress");
let bigCard = document.getElementById("bigCard");
let bigContent = document.getElementById("bigContent");
let backBtn = document.getElementById("backBtn");

let found = 0;

let icons = ["🎆","🎇","🌌","🌠"];

bigGift.onclick = ()=>{
  bigGift.classList.add("hidden");
  gameArea.classList.remove("hidden");
  createCards();
};

function createCards(){

  let giftIndexes = [];

  while(giftIndexes.length < 10){
    let r = Math.floor(Math.random()*20);
    if(!giftIndexes.includes(r)) giftIndexes.push(r);
  }

  for(let i=0;i<20;i++){

    let c = document.createElement("div");
    c.className = "card";

    c.innerText = icons[Math.floor(Math.random()*icons.length)];

    let isGift = giftIndexes.includes(i);

    c.onclick = ()=>{

      if(c.classList.contains("flipped")) return;

      c.classList.add("flipped");

      if(isGift){
        found++;
        progress.innerText = found + " / 10 found";
        show("🎁 Gift found!");
      }else{
        show("😂 Fake gift");
      }
    };

    cardGrid.appendChild(c);
  }
}

function show(text){
  bigContent.innerText = text;
  bigCard.classList.remove("hidden");
}

backBtn.onclick = ()=>{
  bigCard.classList.add("hidden");
};

/* FLOATING BG */
let bg = document.getElementById("bgFloat");
let items = ["🐱","🐰","🌸","🌷","🎂"];

for(let i=0;i<30;i++){
  let d = document.createElement("div");
  d.className = "floatItem";
  d.innerText = items[Math.floor(Math.random()*items.length)];
  d.style.left = Math.random()*100 + "%";
  d.style.fontSize = (15 + Math.random()*25) + "px";
  d.style.animationDuration = (5 + Math.random()*6) + "s";
  bg.appendChild(d);
}

</script>

</body>
</html>
