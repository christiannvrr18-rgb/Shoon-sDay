<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* SLIDE 1 */
#slide1{
  background:black;
}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 20px red;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  text-align:center;
}

h1{
  font-size:55px;
}

p{
  font-size:24px;
}

/* BUTTON CONTAINER */
.btn-container{
  display:flex;
  gap:20px;
  margin-top:20px;
  position:relative;
}

/* BUTTONS */
.choice-btn{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
}

.noBtn{
  background:#555;
  color:white;
  position:absolute;
}

/* MODAL POPUP */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:25px 40px;
  border-radius:15px;
  font-size:22px;
  text-align:center;
}

/* EXPLOSION */
@keyframes explode{
  0%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(2); background:red; }
  100%{ transform:scale(0); opacity:0; }
}

.explode{
  animation:explode 0.5s forwards;
}

/* GLOW */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ box-shadow:0 0 10px #ff4d6d; }
  50%{ box-shadow:0 0 30px #ff4d6d; }
  100%{ box-shadow:0 0 10px #ff4d6d; }
}
</style>
</head>

<body>

<audio id="music">
  <source src="birthday.mp3">
</audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <button class="start-btn" onclick="start()">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
  <p>i have presents for you, want to open?</p>

  <div class="btn-container" id="btnContainer">
    <button id="yesBtn" class="choice-btn" onclick="yes()">YES</button>
    <button id="noBtn1" class="noBtn choice-btn" onclick="no(this)">NO</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box" id="modalText"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let music = document.getElementById("music");

let yesBtn = document.getElementById("yesBtn");
let btnContainer = document.getElementById("btnContainer");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let noCount = 0; // counts clicks for logic
let totalNoButtons = 1; // will become 5
let moveInterval;

/* START */
function start(){
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();
  positionNoButton(document.getElementById("noBtn1"));
}

/* MODAL FUNCTION */
function showModal(text){
  modalText.innerText = text;
  modal.classList.add("show");

  setTimeout(()=>{
    modal.classList.remove("show");
  },2000);
}

/* YES BUTTON */
function yes(){
  showModal("good choice 😌 (next part soon)");
}

/* NO BUTTON LOGIC */
function no(btn){
  noCount++;

  if(noCount === 1){
    showModal("1");
    yesBtn.style.transform="scale(1.4)";

    // teleport
    teleportNo(btn);
  } else if(noCount === 2){
    // multiply
    showModal("2");
    multiplyNoButtons(btn);
    yesBtn.style.transform="scale(1.8)";
  } else if(noCount > 2 && noCount <= 6){ 
    // count popup for each button press
    showModal(`${noCount}`);
    btn.remove();
    if(noCount === 6){
      showModal("shoon lae thu…(  •̀⤙•́  )");
      startSliding(btnContainer);
    }
  } else {
    // explosion
    showModal("explosion time 💥");
    yesBtn.style.transform="scale(2.2)";
    yesBtn.classList.add("glow");

    clearInterval(moveInterval);

    // explode remaining NO buttons
    let noBtns = document.querySelectorAll(".noBtn");
    noBtns.forEach(b=>{
      b.classList.add("explode");
      setTimeout(()=>{b.style.display="none";},500);
    });
  }
}

/* TELEPORT */
function teleportNo(btn){
  let x = Math.random()*(window.innerWidth-100);
  let y = Math.random()*(window.innerHeight-100);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* MULTIPLY BUTTONS */
function multiplyNoButtons(btn){
  let originalBtn = btn;
  let positions = [];

  for(let i=1;i<5;i++){
    let newBtn = btn.cloneNode(true);
    newBtn.id = "noBtn" + (i+1);
    newBtn.onclick = function(){ no(this); };
    btnContainer.appendChild(newBtn);
    positions.push(newBtn);
  }

  // randomly scatter
  positions.push(originalBtn);
  positions.forEach(b=>{
    let x = Math.random()*(window.innerWidth-120);
    let y = Math.random()*(window.innerHeight-120);
    b.style.left = x + "px";
    b.style.top = y + "px";
    b.style.position = "absolute";
  });
}

/* START SLIDING */
function startSliding(container){
  moveInterval = setInterval(()=>{
    let noBtns = document.querySelectorAll(".noBtn");
    noBtns.forEach(b=>{
      let x = Math.random()*(window.innerWidth-120);
      let y = Math.random()*(window.innerHeight-120);
      b.style.transition = "2s linear";
      b.style.left = x + "px";
      b.style.top = y + "px";
    });
  },2000);
}

/* POSITION INITIAL NO BUTTON */
function positionNoButton(btn){
  btn.style.left = yesBtn.offsetLeft + 120 + "px";
  btn.style.top = yesBtn.offsetTop + "px";
}
</script>

</body>
</html>
