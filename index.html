<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* SLIDE 1 */
#slide1{
  background:black;
}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 20px red;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  text-align:center;
}

h1{
  font-size:55px;
}

p{
  font-size:24px;
}

/* BUTTON CONTAINER */
.btn-container{
  display:flex;
  gap:20px;
  margin-top:20px;
}

/* BUTTONS */
.choice-btn{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
}

#noBtn{
  background:#555;
  color:white;
  position:absolute;
}

/* MODAL POPUP */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:25px 40px;
  border-radius:15px;
  font-size:22px;
  text-align:center;
}

/* EXPLOSION */
@keyframes explode{
  0%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(2); background:red; }
  100%{ transform:scale(0); opacity:0; }
}

.explode{
  animation:explode 0.5s forwards;
}

/* GLOW */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ box-shadow:0 0 10px #ff4d6d; }
  50%{ box-shadow:0 0 30px #ff4d6d; }
  100%{ box-shadow:0 0 10px #ff4d6d; }
}
</style>
</head>

<body>

<audio id="music">
  <source src="birthday.mp3">
</audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <button class="start-btn" onclick="start()">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
  <p>i have presents for you, want to open?</p>

  <div class="btn-container">
    <button id="yesBtn" class="choice-btn" onclick="yes()">YES</button>
    <button id="noBtn" class="choice-btn" onclick="no()">NO</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box" id="modalText"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let music = document.getElementById("music");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let count = 0;
let moveInterval;

/* START */
function start(){
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();

  // place NO beside YES initially
  noBtn.style.left = yesBtn.offsetLeft + 120 + "px";
  noBtn.style.top = yesBtn.offsetTop + "px";
}

/* MODAL FUNCTION */
function showModal(text){
  modalText.innerText = text;
  modal.classList.add("show");

  setTimeout(()=>{
    modal.classList.remove("show");
  },2000);
}

/* YES */
function yes(){
  showModal("good choice 😌 (next part soon)");
}

/* NO LOGIC */
function no(){
  count++;

  if(count === 1){
    showModal("why no?૮(◞ ‸ ◟ )ა");
    yesBtn.style.transform="scale(1.4)";

    // teleport ONCE
    teleportNo();
  }

  else if(count === 2){
    showModal("i've been preparing this for 20 days(っ╥﹏╥ς)");
    yesBtn.style.transform="scale(1.8)";

    startSliding();
  }

  else if(count === 3){
    showModal("yep im removing that button before you pmo ς(≖_≖ )ﾉ🔪");
    yesBtn.style.transform="scale(2.2)";
    yesBtn.classList.add("glow");

    clearInterval(moveInterval);

    noBtn.classList.add("explode");

    setTimeout(()=>{
      noBtn.style.display="none";
    },500);
  }
}

/* TELEPORT */
function teleportNo(){
  let x = Math.random()*(window.innerWidth-100);
  let y = Math.random()*(window.innerHeight-100);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* SMOOTH SLIDING */
function startSliding(){
  moveInterval = setInterval(()=>{
    let x = Math.random()*(window.innerWidth-120);
    let y = Math.random()*(window.innerHeight-120);

    noBtn.style.transition = "0.8s linear";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  },1000);
}
</script>

</body>
</html>
