<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

/* SLIDE 1 */
#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:30px;
}

#cat{
  width:380px;
  max-width:85%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

/* YES */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

/* NO */
#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

/* POPUP */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

/* YES GROW */
@keyframes pulse{
  0%{transform:scale(var(--s));}
  50%{transform:scale(calc(var(--s) + 0.15));}
  100%{transform:scale(var(--s));}
}

.grow{
  animation:pulse 0.6s infinite;
}

/* SLIDE 3 */
#slide3{
  background:#ffd6e0;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* BIG GIFT */
#bigGift{
  font-size:80px;
  cursor:pointer;
  transition:0.3s;
}
#bigGift:hover{transform:scale(1.2);}

/* GAME */
#cardGrid{
  display:grid;
  grid-template-columns:repeat(5,70px);
  gap:15px;
  margin-top:20px;
}

.card{
  width:70px;
  height:90px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card.flipped{
  background:#ff4d6d;
  color:white;
}

/* BIG CARD */
#bigCard{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#bigContent{
  background:white;
  padding:30px;
  border-radius:15px;
}

.hidden{display:none;}

/* FLOAT BG */
#bgFloat{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.floatItem{
  position:absolute;
  opacity:0.4;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<img src="bdaycat.png" id="cat">

<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">

<h2>🎁 Tap the gift</h2>
<div id="bigGift">🎁</div>

<div id="gameArea" class="hidden">
<h2>Find the hidden gifts 🎁</h2>
<p id="progress">0 / 10 found</p>
<div id="cardGrid"></div>
</div>

<div id="bigCard" class="hidden">
<div id="bigContent"></div>
<button id="backBtn">Back</button>
</div>

<div id="bgFloat"></div>

</div>

<!-- POPUP -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;
  try{ await music2.play(); }catch(e){}
};

/* NO SIMPLE (skip game issues for now) */
noBtn.onclick = ()=>{
  pop("just press yes 😭");
};

/* SLIDE 3 GAME */

let bigGift = document.getElementById("bigGift");
let gameArea = document.getElementById("gameArea");
let cardGrid = document.getElementById("cardGrid");
let progressText = document.getElementById("progress");

let bigCard = document.getElementById("bigCard");
let bigContent = document.getElementById("bigContent");
let backBtn = document.getElementById("backBtn");

let found = 0;
let icons = ["🎆","🎇","🌌","🌠"];

/* OPEN */
bigGift.onclick = ()=>{
  bigGift.classList.add("hidden");
  gameArea.classList.remove("hidden");
  createCards();
};

function createCards(){

  let total = 20;
  let giftIndexes = [];

  while(giftIndexes.length < 10){
    let r = Math.floor(Math.random()*total);
    if(!giftIndexes.includes(r)) giftIndexes.push(r);
  }

  for(let i=0;i<total;i++){

    let card = document.createElement("div");
    card.className = "card";
    card.innerText = icons[Math.floor(Math.random()*icons.length)];

    let isGift = giftIndexes.includes(i);

    card.onclick = ()=>{

      if(card.classList.contains("flipped")) return;
      card.classList.add("flipped");

      if(isGift){
        found++;
        progressText.innerText = `${found} / 10 found`;
        showBigCard("🎁 Gift (placeholder)");
      }else{
        showBigCard("😂 Fake gift");
      }
    };

    cardGrid.appendChild(card);
  }
}

function showBigCard(text){
  bigContent.innerText = text;
  bigCard.classList.remove("hidden");
}

backBtn.onclick = ()=>{
  bigCard.classList.add("hidden");
};

/* FLOAT BG */
let bg = document.getElementById("bgFloat");
let bgIcons = ["🐱","🐰","🌸","🌷","🎂"];

for(let i=0;i<25;i++){
  let item = document.createElement("div");
  item.className = "floatItem";
  item.innerText = bgIcons[Math.floor(Math.random()*bgIcons.length)];

  item.style.left = Math.random()*100 + "%";
  item.style.animationDuration = (5 + Math.random()*5) + "s";
  item.style.fontSize = (15 + Math.random()*20) + "px";

  bg.appendChild(item);
}
</script>

</body>
</html>
