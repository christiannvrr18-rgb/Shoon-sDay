<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* SLIDE 1 */
#slide1{
  background:black;
}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 20px red;
  transition:0.2s;
}

.start-btn:hover{
  transform:scale(1.1);
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  text-align:center;
}

h1{
  font-size:55px;
}

p{
  font-size:24px;
}

/* BUTTON CONTAINER */
.btn-container{
  display:flex;
  gap:20px;
  margin-top:20px;
  position:relative;
}

/* BUTTONS */
.choice-btn{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
}

#noBtn{
  background:#555;
  color:white;
  position:relative;
}

/* POPUP */
.popup{
  margin-top:20px;
  font-size:22px;
  color:#8b0033;
}

/* GLOW */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ box-shadow:0 0 10px #ff4d6d; }
  50%{ box-shadow:0 0 30px #ff4d6d; }
  100%{ box-shadow:0 0 10px #ff4d6d; }
}

/* SLIDE ANIMATION */
.slide-move{
  animation:slideMove 0.5s forwards;
}

@keyframes slideMove{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(150px); }
}

/* CONTINUOUS FLOAT */
.float{
  animation:floatMove 2s infinite alternate ease-in-out;
}

@keyframes floatMove{
  0%{ transform:translateX(0px); }
  100%{ transform:translateX(200px); }
}

/* EXPLOSION */
.explode{
  animation:explode 0.6s forwards;
}

@keyframes explode{
  0%{
    transform:scale(1);
    opacity:1;
  }
  50%{
    transform:scale(1.8);
    background:red;
  }
  100%{
    transform:scale(0);
    opacity:0;
  }
}
</style>
</head>

<body>

<audio id="music">
  <source src="birthday.mp3">
</audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <button class="start-btn" onclick="start()">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
  <p>i have presents for you, want to open?</p>

  <div class="btn-container">
    <button id="yesBtn" class="choice-btn" onclick="yes()">YES</button>
    <button id="noBtn" class="choice-btn" onclick="no()">NO</button>
  </div>

  <div id="popup" class="popup"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let music = document.getElementById("music");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let popup = document.getElementById("popup");

let count = 0;

/* START */
function start(){
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();
}

/* YES */
function yes(){
  popup.innerText="good choice 😌 (next part soon)";
}

/* NO LOGIC */
function no(){
  count++;

  if(count === 1){
    popup.innerText="why no?૮(◞ ‸ ◟ )ა";
    yesBtn.style.transform="scale(1.4)";
    
    // slight move only (natural)
    noBtn.style.transform="translateX(40px)";
  }

  else if(count === 2){
    popup.innerText="i've been preparing this for 20 days(っ╥﹏╥ς)";
    yesBtn.style.transform="scale(1.8)";
    
    // smooth sliding motion
    noBtn.classList.add("slide-move");

    setTimeout(()=>{
      noBtn.classList.remove("slide-move");
      noBtn.classList.add("float"); // continuous smooth movement
    },500);
  }

  else if(count === 3){
    popup.innerText="yep im removing that button before you pmo ς(≖_≖ )ﾉ🔪";
    yesBtn.style.transform="scale(2.2)";
    yesBtn.classList.add("glow");

    // explosion
    noBtn.classList.remove("float");
    noBtn.classList.add("explode");

    setTimeout(()=>{
      noBtn.style.display="none";
    },600);
  }
}
</script>

</body>
</html>
