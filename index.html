<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

/* SLIDE 1 */
#slide1{
  background:black;
  flex-direction:column;
}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 HERO LAYOUT */
#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  padding-top:30px;
  position:relative;
}

/* CAT (HERO IMAGE) */
#cat{
  width:380px;
  max-width:85%;
  margin-bottom:10px;
}

/* TITLE */
#slide2 h1{
  margin:0;
  font-size:28px;
}

/* SUBTEXT */
#slide2 p{
  margin-top:10px;
}

/* BUTTONS */
.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:18px;
}

/* YES BUTTON (REAL FIXED GROW SYSTEM) */
#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  transform:scale(1);
  transition:transform 0.2s ease;
  z-index:10;
}

/* NO BUTTON */
#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
  z-index:10;
}

/* POPUP */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px 30px;
  border-radius:15px;
}

/* YES GROW + PULSE (FIXED PROPERLY) */
.grow{
  animation:pulse 0.6s infinite;
}

@keyframes pulse{
  0%{transform:scale(var(--scale));}
  50%{transform:scale(calc(var(--scale) + 0.15));}
  100%{transform:scale(var(--scale));}
}

/* EXPLODE */
@keyframes explode{
  to{transform:scale(0);opacity:0;}
}
.explode{animation:explode .3s forwards;}

/* SLIDE 3 */
#slide3{
  background:#ffd6e0;
  flex-wrap:wrap;
}

.float{
  position:absolute;
  font-size:24px;
  animation:float 6s infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="bgMusic" src="minmhamin.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 (HERO) -->
<div id="slide2" class="slide">

<img src="bdaycat.png" id="cat">

<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide"></div>

<!-- POPUP -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let startBtn = document.getElementById("startBtn");
let bgMusic = document.getElementById("bgMusic");

let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let scale = 1;
let noClicks = 0;

/* POPUP */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");

  setTimeout(()=>{
    modal.classList.remove("show");
  },1500);
}

/* YES GROW FIX (REAL WORKING VERSION) */
function growYes(){
  scale += 0.18;
  yesBtn.style.setProperty('--scale', scale);
  yesBtn.style.transform = `scale(${scale})`;
}

/* START */
startBtn.onclick = ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  bgMusic.play();
};

/* YES */
yesBtn.onclick = ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
};

/* NO */
noBtn.onclick = ()=>{
  noClicks++;
  growYes();

  if(noClicks===1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
  }
  else if(noClicks===2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
  }
};
</script>

</body>
</html>
