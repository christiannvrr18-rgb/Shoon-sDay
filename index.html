<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOONSDAY</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}
.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  animation:pulse 1.5s infinite;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* SLIDE 3 */
#slide3::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #ffc2d1 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #ffd6e0 0%, transparent 40%);
  z-index:0;
}

/* UI */
#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-weight:bold;
  z-index:5;
}

#giftWrap{
  position:relative;
  z-index:5;
  text-align:center;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

/* CARDS */
#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
  z-index:5;
}

.card{
  width:80px;
  height:80px;
  perspective:600px;
  cursor:pointer;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.card.flip .inner{transform:rotateY(180deg);}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:14px;
}

.front{background:white;font-size:30px;}
.back{background:#ffc2d1;transform:rotateY(180deg);}

/* POPUP */
.popup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:15px 25px;
  border-radius:12px;
  z-index:9999;
}

/* REWARD */
#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:90%;
  max-height:90%;
  overflow:auto;
}

#rewardBody video,
#rewardBody img,
#rewardBody iframe{
  max-width:90vw;
  max-height:75vh;
}

/* CONFETTI */
.confetti{position:absolute;}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">

<div id="gameTitle">find your gifts ₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

<div id="giftWrap">
<div>open it already ৻(  •̀ ᗜ •́  ৻)</div>
<div id="bigGift">🎁</div>
</div>

<div id="cardGrid"></div>
</div>

<div id="rewardBox">
<div id="rewardContent">
<div id="rewardBody"></div>
<br>
<button onclick="closeReward()">OK</button>
</div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let cat = document.getElementById("cat");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let noRemaining = 5;
let yesScale = 1;
let noClones = [];

/* POPUP */
function pop(text){
  modal.classList.remove("show");
  void modal.offsetWidth;
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");

  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;

  try{ await music2.play(); }catch(e){}

  confettiBurst();
};

/* CONFETTI 🎉 */
function confettiBurst(){
  for(let i=0;i<40;i++){
    let c = document.createElement("div");
    c.style.position = "fixed";
    c.style.width = "8px";
    c.style.height = "8px";
    c.style.background = `hsl(${Math.random()*360},100%,60%)`;
    c.style.left = Math.random()*100 + "vw";
    c.style.top = "-10px";
    c.style.zIndex = 9999;

    document.body.appendChild(c);

    let fall = setInterval(()=>{
      let top = parseFloat(c.style.top);
      c.style.top = (top + 5) + "px";
      c.style.transform = `rotate(${top*5}deg)`;

      if(top > window.innerHeight){
        c.remove();
        clearInterval(fall);
      }
    },16);
  }
}

/* GROW YES */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.setProperty("--s", yesScale);
}

/* CAT REACTION 😾 */
function catReact(type){
  if(type === "angry"){
    cat.style.transform = "scale(1.05) rotate(-2deg)";
  }
  if(type === "sad"){
    cat.style.transform = "scale(0.95)";
  }
  if(type === "happy"){
    cat.style.transform = "scale(1.1)";
  }

  setTimeout(()=>cat.style.transform="scale(1)",300);
}

/* NO LOGIC */
function consumeNo(){
  noRemaining--;
  growYes();

  if(noRemaining === 4){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    catReact("sad");
  }
  else if(noRemaining === 3){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    catReact("angry");
  }
  else if(noRemaining === 2){
    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
  }
  else if(noRemaining === 1){
    pop("that’s it, no more No button for you (ᗒᗣᗕ)");
  }
  else if(noRemaining <= 0){
    finalState();
  }
}

/* MAIN NO */
noBtn.onclick = ()=>{
  if(noRemaining > 3){
    consumeNo();
    moveButton(noBtn);
  }
  else if(noRemaining === 3){
    consumeNo();
    spawnClones();
  }
  else{
    consumeNo();
  }
};

/* MOVE BUTTON */
function moveButton(btn){
  btn.style.left = (Math.random()*60 + 20) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

/* CLONES (SMART ESCAPE 😈) */
function spawnClones(){

  noBtn.style.display = "none";

  for(let i=0;i<5;i++){

    let clone = document.createElement("button");
    clone.innerText = "NO";
    clone.className = "choice-btn";

    clone.style.background = "#444";
    clone.style.color = "white";

    moveButton(clone);

    /* ESCAPE MECHANIC */
    let canMove = true;

    function tryEscape(e){

      if(!canMove) return;

      let rect = clone.getBoundingClientRect();

      let dx = e.clientX - (rect.left + rect.width/2);
      let dy = e.clientY - (rect.top + rect.height/2);

      let distance = Math.sqrt(dx*dx + dy*dy);

      if(distance < 120){ // detection radius

        canMove = false;

        setTimeout(()=>{
          moveButton(clone);
          canMove = true;
        },200); // delay = catchable
      }
    }

    /* MOUSE + TOUCH */
    document.addEventListener("mousemove", tryEscape);
    document.addEventListener("touchmove", (e)=>{
      tryEscape(e.touches[0]);
    });

    clone.onclick = ()=>{
      if(noRemaining <= 0) return;

      consumeNo();
      clone.remove();

      if(noRemaining <= 0){
        finalState();
      }
    };

    slide2.appendChild(clone);
    noClones.push(clone);
  }
}

/* FINAL */
function finalState(){

  noClones.forEach(btn => btn.remove());
  noClones = [];

  if(noBtn) noBtn.remove();

  yesBtn.classList.add("grow");

  catReact("happy");
  pop("fine... just press YES already (╥﹏╥)");
}
</script>
  
</body>
</html>
