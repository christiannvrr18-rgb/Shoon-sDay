<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* SLIDE 1 */
#slide1{
  background:black;
}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 20px red;
}

/* SLIDE 2 */
#slide2{
  background:#ffd6e0;
  text-align:center;
}

h1{
  font-size:60px;
}

p{
  font-size:26px;
}

/* BUTTONS */
.btn-container{
  display:flex;
  gap:20px;
  margin-top:30px;
}

.choice-btn{
  padding:15px 30px;
  font-size:22px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.2s;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
}

#noBtn{
  background:#555;
  color:white;
  position:relative;
}

/* POPUP MODAL */
.popup-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:25px 40px;
  border-radius:20px;
  font-size:22px;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

/* GLOW */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ box-shadow:0 0 10px #ff4d6d; }
  50%{ box-shadow:0 0 30px #ff4d6d; }
  100%{ box-shadow:0 0 10px #ff4d6d; }
}

/* EXPLOSION */
.explode{
  animation:explode 0.5s forwards;
}

@keyframes explode{
  0%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(2); background:red; }
  100%{ transform:scale(0); opacity:0; }
}
</style>
</head>

<body>

<audio id="music">
  <source src="birthday.mp3">
</audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <button class="start-btn" onclick="start()">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
  <p>i have presents for you, want to open?</p>

  <div class="btn-container">
    <button id="yesBtn" class="choice-btn" onclick="yes()">YES</button>
    <button id="noBtn" class="choice-btn" onclick="no()">NO</button>
  </div>
</div>

<!-- POPUP -->
<div id="popupBg" class="popup-bg" onclick="closePopup()">
  <div class="popup-box" id="popupText"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let music = document.getElementById("music");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let popupBg = document.getElementById("popupBg");
let popupText = document.getElementById("popupText");

let count = 0;
let moveInterval;

/* START */
function start(){
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();
}

/* POPUP */
function showPopup(text){
  popupText.innerText = text;
  popupBg.style.display = "flex";
}

function closePopup(){
  popupBg.style.display = "none";
}

/* YES */
function yes(){
  showPopup("good choice 😌 (next part soon)");
}

/* RANDOM TELEPORT */
function teleport(){
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 100);
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* FAST CHAOTIC MOVEMENT */
function startChaos(){
  moveInterval = setInterval(()=>{
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.transition = "0.1s";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  },100); // FAST
}

/* NO LOGIC */
function no(){
  count++;

  if(count === 1){
    showPopup("why no?૮(◞ ‸ ◟ )ა");
    yesBtn.style.transform="scale(1.5)";
    teleport();
  }

  else if(count === 2){
    showPopup("i've been preparing this for 20 days(っ╥﹏╥ς)");
    yesBtn.style.transform="scale(2)";
    startChaos();
  }

  else if(count === 3){
    showPopup("yep im removing that button before you pmo ς(≖_≖ )ﾉ🔪");

    clearInterval(moveInterval);
    noBtn.classList.add("explode");

    yesBtn.style.transform="scale(2.5)";
    yesBtn.classList.add("glow");

    setTimeout(()=>{
      noBtn.style.display="none";
    },500);
  }
}
</script>

</body>
</html>
