<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
}

#yesBtn{background:#ff4d6d;color:white;left:40%;top:75%;}
#noBtn{background:#444;color:white;left:55%;top:75%;}

/* SLIDE 3 */

#slide3{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
}

#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

#giftText{
  margin-bottom:10px;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
}

.card{
  width:70px;
  height:70px;
  background:white;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.bg-float{
  position:absolute;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.confetti{
  position:absolute;
  animation:fall 1.8s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
#giftWrap{
  z-index:1;
}

#cardGrid{
  z-index:5;
}

#rewardBox{
  z-index:99999;
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>
  
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">
  <div id="gameTitle">find your gifts₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

  <div id="giftWrap">
    <div id="giftText">well open it already ৻(  •̀ ᗜ •́  ৻)</div>
    <div id="bigGift">🎁</div>
  </div>

  <div id="cardGrid"></div>
</div>

<div id="rewardBox">
  <div id="rewardContent">
    <div id="rewardText"></div>
    <br>
    <button onclick="closeReward()">OK</button>
  </div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");
let clickCount = 0;
let clones = [];
let moving = false;
let moveInterval = null;
let stage = 0;
let yesScale = 1;
document.getElementById("startBtn").onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{await music1.play();}catch{}
};

document.getElementById("yesBtn").onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  try{await music2.play();}catch{}

  spawnFloating();
};

function spawnFloating(){
  let emojis=["🐱","🐰","🌸","🎀","🎂"];
  setInterval(()=>{
    let e=document.createElement("div");
    e.className="bg-float";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"%";
    e.style.animationDuration=(5+Math.random()*5)+"s";
    document.getElementById("slide3").appendChild(e);
    setTimeout(()=>e.remove(),10000);
  },500);
}

/* GIFT SYSTEM */

let bigGift=document.getElementById("bigGift");
let cardGrid=document.getElementById("cardGrid");
let rewardText=document.getElementById("rewardText");

bigGift.onclick=()=>{
  document.getElementById("giftWrap").style.display="none";
  document.getElementById("gameTitle").style.display="block";
  cardGrid.style.display="grid";
  generateCards();
  explodeConfetti();
};

function generateCards(){

  let icons = ["🎆","🎇","🌌","🌠"];

  // ===== YOUR 20 GIFTS =====
  let gifts = [

    // 🎥 VIDEOS (11)
    {type:"video", src:"vid1.mp4"},
    {type:"video", src:"vid2.mp4"},
    {type:"video", src:"vid3.mp4"},
    {type:"video", src:"vid4.mp4"},
    {type:"video", src:"vid5.mp4"},
    {type:"video", src:"vid6.mp4"},
    {type:"video", src:"vid7.mp4"},
    {type:"video", src:"vid8.mp4"},
    {type:"video", src:"vid9.mp4"},
    {type:"video", src:"vid10.mp4"},
    {type:"video", src:"vid11.mp4"},

    // 🖼️ IMAGES (7)
    {type:"image", src:"img1.jpg"},
    {type:"image", src:"img2.jpg"},
    {type:"image", src:"img3.jpg"},
    {type:"image", src:"img4.jpg"},
    {type:"image", src:"img5.jpg"},
    {type:"image", src:"img6.jpg"},
    {type:"image", src:"img7.jpg"},

    // 🎬 YOUTUBE (1)
    {
      type:"youtube",
      src:"https://www.youtube.com/embed/1o00J04ThXQ"
    },

    // 💌 FINAL MESSAGE (LAST GIFT)
    {
      type:"final",
      text:`happy birthday, i hope today is filled with so much happiness, laughter, and moments that make u genuinely smile...
      
you deserve that.

happy birthday again shooney. – the goat and yo boi Lloyd ᕙ( •̀ ᗜ •́ )ᕗ`
    }

  ];

  // shuffle except final message (keep last)
  let finalGift = gifts.pop();
  gifts.sort(()=>Math.random()-0.5);
  gifts.push(finalGift);

  cardGrid.innerHTML = "";

  gifts.forEach(gift=>{
    let card = document.createElement("div");
    card.className = "card";
    card.innerText = icons[Math.floor(Math.random()*icons.length)];

    card.onclick = ()=>openGift(gift);

    cardGrid.appendChild(card);
  });
}

function openGift(gift){

  let rewardBody = document.getElementById("rewardBody");

  // STOP BG MUSIC
  music2.pause();

  rewardBody.innerHTML = "";

  if(gift.type === "video"){
    rewardBody.innerHTML = `
      <video controls autoplay style="max-width:300px;">
        <source src="${gift.src}" type="video/mp4">
      </video>
    `;
  }

  else if(gift.type === "image"){
    rewardBody.innerHTML = `
      <img src="${gift.src}" style="max-width:300px; border-radius:10px;">
    `;
  }

  else if(gift.type === "youtube"){
    rewardBody.innerHTML = `
      <iframe width="300" height="200"
      src="${gift.src}"
      frameborder="0"
      allowfullscreen></iframe>
    `;
  }

  else if(gift.type === "final"){

    document.getElementById("finalMusic").currentTime = 0;
    document.getElementById("finalMusic").play();

    rewardBody.innerHTML = `
      <div style="max-width:300px; font-size:14px; text-align:left;">
        ${gift.text}
      </div>
    `;
  }

  rewardBox.style.display = "flex";
}
function growYes(){
  yesScale += 0.25;
  document.getElementById("yesBtn").style.transform = `scale(${yesScale})`;
}
function teleport(btn){
  btn.style.position = "absolute";
  btn.style.left = (Math.random()*70 + 10) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}
function spawnClones(){

  let noBtn = document.getElementById("noBtn");
  noBtn.style.display = "none";

  clones = [];
  clickCount = 0;

  for(let i=0;i<5;i++){
    let c = document.createElement("button");
    c.className = "choice-btn";
    c.innerText = "NO";

    teleport(c);

    c.onclick = ()=>handleCloneClick(c);

    document.getElementById("slide2").appendChild(c);
    clones.push(c);
  }
}
function handleCloneClick(btn){

  if(moving) return;

  btn.remove();
  clones = clones.filter(b=>b!==btn);

  clickCount++;

  if(clickCount === 1) pop("3...");
  if(clickCount === 2) pop("2...");
  if(clickCount === 3) pop("1...");

  if(clickCount === 4){
    pop("Shoon lae thu…( •̀⤙•́ )");
  }

  if(clickCount === 5){

    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

    let finalBtn = document.createElement("button");
    finalBtn.className = "choice-btn";
    finalBtn.innerText = "NO";

    teleport(finalBtn);
    document.getElementById("slide2").appendChild(finalBtn);

    startMoving(finalBtn);
  }
}
function startMoving(btn){

  moving = true;

  moveInterval = setInterval(()=>{

    let x = parseFloat(btn.style.left) || 50;
    let y = parseFloat(btn.style.top) || 50;

    x += (Math.random()*20 - 10);
    y += (Math.random()*20 - 10);

    x = Math.max(10, Math.min(80, x));
    y = Math.max(20, Math.min(80, y));

    btn.style.left = x + "%";
    btn.style.top = y + "%";

  },600);

  btn.onclick = ()=>{

    clearInterval(moveInterval);

    pop("that’s it, no more No button for you (ᗒᗣᗕ)");

    btn.remove();

    growYes();
    document.getElementById("yesBtn").classList.add("grow");
  };
}
function closeReward(){
  rewardBox.style.display = "none";

  // resume bg music if not final
  let finalMusic = document.getElementById("finalMusic");

  if(finalMusic.paused){
    music2.play();
  }else{
    finalMusic.pause();
  }
}

function explodeConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerText="🎉";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}
</script>

</body>
</html>
