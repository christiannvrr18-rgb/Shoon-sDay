<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:Arial;}
.slide{display:none;position:absolute;width:100%;height:100%;justify-content:center;align-items:center;flex-direction:column;}
.active{display:flex;}

/* Slide1 */
#slide1{background:black;}
.start-btn{background:red;color:white;padding:25px 50px;font-size:24px;border:none;border-radius:15px;cursor:pointer;box-shadow:0 0 25px red;}

/* Slide2 */
#slide2{background:#ffd6e0;position:relative;text-align:center;}
h1{margin-top:40px;}
p{margin-top:10px;}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:18px;
}

#yesBtn{background:#ff4d6d;color:white;left:40%;top:70%;}
#noBtn{background:#444;color:white;left:55%;top:70%;}

/* Cat centered */
#bdayCat{
  width:120px;
  position:absolute;
  top:120px;
  left:50%;
  transform:translateX(-50%);
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,-15px);}
  100%{transform:translate(-50%,0);}
}

/* Modal */
.modal{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  z-index:9999;
}
.modal.show{opacity:1;pointer-events:auto;}
.modal-box{background:white;padding:20px 40px;border-radius:15px;}

/* Glow */
.glow{animation:pulse 1s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 10px #ff4d6d;}
  50%{box-shadow:0 0 30px #ff4d6d;}
  100%{box-shadow:0 0 10px #ff4d6d;}
}

/* Explosion */
@keyframes explode{to{transform:scale(0);opacity:0;}}
.explode{animation:explode .3s forwards;}

/* Slide3 */
#slide3{background:#ffd6e0;}
.float{position:absolute;font-size:24px;animation:float2 6s infinite;}
@keyframes float2{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="birthday.mp3">
</audio>

<!-- Slide1 -->
<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- Slide2 -->
<div id="slide2" class="slide">
<h1>Happy Birthday Shoon! ⸜(｡˃ ᵕ ˂ )⸝🎂</h1>
<img src="bdaycat.png" id="bdayCat">
<p>I have presents for you, want to open?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<!-- Slide3 -->
<div id="slide3" class="slide"></div>

<!-- Modal -->
<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let startBtn=document.getElementById("startBtn");
let slide1=document.getElementById("slide1");
let slide2=document.getElementById("slide2");
let slide3=document.getElementById("slide3");

let yesBtn=document.getElementById("yesBtn");
let noBtn=document.getElementById("noBtn");

let modal=document.getElementById("modal");
let modalText=document.getElementById("modalText");

let music=document.getElementById("music");

let yesScale=1;
let noClicks=0;

let multiplyCount=3;
let finishedMultiply=false;

/* START */
startBtn.onclick=()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  music.play();
};

/* POPUP */
function pop(t){
  modalText.innerText=t;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),2000);
}

/* GROW YES */
function growYes(){
  yesScale+=0.25;
  yesBtn.style.transform=`scale(${yesScale})`;
}

/* YES */
yesBtn.onclick=()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");
  spawnCute();
};

/* NO */
noBtn.onclick=()=>{
  noClicks++;
  growYes();

  if(noClicks===1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }
  else if(noClicks===2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    multiply();
  }
};

/* TELEPORT */
function teleport(btn){
  btn.style.left=Math.random()*80+"%";
  btn.style.top=Math.random()*80+"%";
}

/* MULTIPLY */
function multiply(){
  noBtn.style.display="none";
  multiplyCount=3;
  finishedMultiply=false;

  for(let i=0;i<5;i++){
    let b=noBtn.cloneNode(true);
    b.style.display="block";
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*60+"%";
    slide2.appendChild(b);

    b.onclick=()=>{
      if(finishedMultiply) return;

      growYes();

      if(multiplyCount>0){
        pop(multiplyCount);
      }

      multiplyCount--;

      if(multiplyCount<0){
        finishedMultiply=true;

        pop("shoon lae thu…(  •̀⤙•́ )");

        document.querySelectorAll("#slide2 button").forEach(btn=>{
          if(btn.innerText==="NO") btn.remove();
        });

        finalStage();
      }

      b.remove();
    };
  }
}

/* FINAL STAGE */
function finalStage(){
  let b1=noBtn.cloneNode(true);
  let b2=noBtn.cloneNode(true);

  b1.style.display="block";
  b2.style.display="block";

  b1.style.left="40%";
  b2.style.left="55%";
  b1.style.top=b2.style.top="70%";

  slide2.appendChild(b1);
  slide2.appendChild(b2);

  b1.onclick=()=>{
    growYes();
    pop("shoon lae thu…(  •̀⤙•́ )");
    b1.remove();
  };

  b2.onclick=()=>{
    growYes();
    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
    move(b2);
  };
}

/* MOVE */
function move(btn){
  let i=setInterval(()=>{
    btn.style.left=Math.random()*80+"%";
    btn.style.top=Math.random()*60+"%";
  },1500);

  btn.onclick=()=>{
    growYes();
    clearInterval(i);
    pop("fine imma pop this before u pmo ς(≖_≖ )ﾉ🔪");
    btn.classList.add("explode");
    yesBtn.classList.add("glow");
  };
}

/* SLIDE3 */
function spawnCute(){
  let items=["💖","✨","🍓","🐱","🐰"];
  for(let i=0;i<40;i++){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=items[Math.floor(Math.random()*items.length)];
    e.style.left=Math.random()*100+"%";
    e.style.top=Math.random()*100+"%";
    slide3.appendChild(e);
  }
}
</script>

</body>
</html>
