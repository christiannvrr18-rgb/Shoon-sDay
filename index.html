<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:30px;
}

#cat{
  width:380px;
  max-width:85%;
  margin-bottom:10px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
  user-select:none;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
  --s:1;
  transform:scale(var(--s));
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

.grow{
  animation:pulse 0.6s infinite;
}

@keyframes pulse{
  0%{transform:scale(var(--s));}
  50%{transform:scale(calc(var(--s) + 0.2));}
  100%{transform:scale(var(--s));}
}

#slide3{
  background:#ffd6e0;
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">

<img src="bdaycat.png" id="cat">

<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>

<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>

</div>

<div id="slide3" class="slide"></div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let noRemaining = 5;
let yesScale = 1;
let noClones = [];

/* POPUP */
function pop(text){
  modal.classList.remove("show");
  void modal.offsetWidth;
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");

  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;

  try{ await music2.play(); }catch(e){}
};

/* GROW YES */
function growYes(){
  yesScale += 0.25;
  yesBtn.style.setProperty("--s", yesScale);
}

/* NO LOGIC */
function consumeNo(){
  noRemaining--;
  growYes();

  if(noRemaining === 4){
    pop("why no? ૮(◞ ‸ ◟ )ა");
  }
  else if(noRemaining === 3){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
  }
  else if(noRemaining === 2){
    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");
  }
  else if(noRemaining === 1){
    pop("that’s it, no more No button for you (ᗒᗣᗕ)");
  }
  else if(noRemaining <= 0){
    finalState();
  }
}

/* MAIN NO BUTTON */
noBtn.onclick = ()=>{

  if(noRemaining > 3){
    consumeNo();

    noBtn.style.left = (Math.random()*60 + 20) + "%";
    noBtn.style.top = (Math.random()*60 + 20) + "%";
  }

  else if(noRemaining === 3){
    consumeNo();
    spawnClones();
  }

  else{
    consumeNo();
  }
};

/* CLONES (FIXED) */
function spawnClones(){

  noBtn.style.display = "none";

  for(let i=0;i<5;i++){

    let clone = document.createElement("button");
    clone.innerText = "NO";
    clone.className = "choice-btn";

    clone.style.background = "#444";
    clone.style.color = "white";

    clone.style.left = (Math.random()*60 + 20) + "%";
    clone.style.top = (Math.random()*60 + 20) + "%";

    clone.onclick = ()=>{

      if(noRemaining <= 0) return;

      consumeNo();

      clone.remove();
      noClones = noClones.filter(btn => btn !== clone);

      if(noRemaining <= 0){
        finalState();
      }
    };

    slide2.appendChild(clone);
    noClones.push(clone);
  }
}

/* FINAL */
function finalState(){

  noClones.forEach(btn => btn.remove());
  noClones = [];

  if(noBtn) noBtn.remove();

  yesBtn.classList.add("grow");

  pop("that’s it, no more No button for you (ᗒᗣᗕ)");
}
</script>

</body>
</html>
