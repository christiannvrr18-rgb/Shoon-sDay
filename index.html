<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Game</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
  padding-top:20px;
}

#cat{
  width:420px;
  max-width:90%;
  margin-bottom:5px;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  z-index:10;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  left:40%;
  top:75%;
}

#noBtn{
  background:#444;
  color:white;
  left:55%;
  top:75%;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:9999;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
}

.grow{
  animation:pulse 0.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* ===== SLIDE 3 ===== */

#slide3{
  background:#ffd6e0;
  position:relative;
  flex-direction:column;
  overflow:hidden;
}

#bigGift{
  font-size:90px;
  cursor:pointer;
  z-index:5;
}

#cardGrid{
  display:none; /* FIXED */
  position:absolute;
  top:80px;
  width:100%;
  padding:20px;
  box-sizing:border-box;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:15px;
  height:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  cursor:pointer;
}

#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

#rewardContent{
  background:white;
  padding:25px;
  border-radius:15px;
}

.bg-float{
  position:absolute;
  font-size:20px;
  animation:floatUp linear infinite;
  opacity:0.6;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
/* ===== NEW SLIDE 3 UI ===== */

#gameTitle{
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:50%;
  width:100%;
  z-index:5;
}

#giftText{
  font-size:18px;
  margin-bottom:10px;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

/* FIX GRID */
#cardGrid{
  display:none;
  position:absolute;
  top:100px;
  width:100%;
  padding:10px;
  box-sizing:border-box;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
}

/* BETTER CARDS */
.card{
  width:70px;
  height:70px;
  background:white;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.1);
}

/* CONFETTI */
.confetti{
  position:absolute;
  font-size:18px;
  animation:fall 1.8s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh) rotate(0);}
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>

<div id="slide1" class="slide active">
<button id="startBtn" class="start-btn">PRESS</button>
</div>

<div id="slide2" class="slide">
<img src="bdaycat.png" id="cat">
<h1>Happy Birthday Shoon! 🎂</h1>
<p>Open your presents?</p>
<button id="yesBtn" class="choice-btn">YES</button>
<button id="noBtn" class="choice-btn">NO</button>
</div>

<div id="slide3" class="slide">

  <div id="gameTitle">find your gifts₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

  <div id="giftWrap">
    <div id="giftText">well open it already ৻(  •̀ ᗜ •́  ৻)</div>
    <div id="bigGift">🎁</div>
  </div>

  <div id="cardGrid"></div>
</div>

<div id="rewardBox">
  <div id="rewardContent">
    <div id="rewardText"></div>
    <button onclick="rewardBox.style.display='none'">OK</button>
  </div>
</div>

<div id="modal" class="modal">
<div id="modalText" class="modal-box"></div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let startBtn = document.getElementById("startBtn");
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let modal = document.getElementById("modal");
let modalText = document.getElementById("modalText");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

/* STATE */
let stage = 0;
let yesScale = 1;

let clones = [];
let clickCount = 0;
let finalBtn = null;
let moving = false;
let moveInterval = null;

/* POPUP (SLOWER) */
function pop(text){
  modalText.innerText = text;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),3500);
}

/* START */
startBtn.onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{ await music1.play(); }catch(e){}
};

/* YES */
yesBtn.onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music2.currentTime = 0;
  try{ await music2.play(); }catch(e){}

  spawnFloating();
};

/* FLOATING BG */
function spawnFloating(){
  let emojis = ["🐱","🐰","🌸","🍓","🎀","🌷","🌹","🎂"];

  setInterval(()=>{
    let el = document.createElement("div");
    el.className = "bg-float";
    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    el.style.left = Math.random()*100 + "%";
    el.style.fontSize = (25 + Math.random()*20) + "px";
    el.style.animationDuration = (6 + Math.random()*6) + "s";

    slide3.appendChild(el);
    setTimeout(()=>el.remove(),12000);
  },400);
}

/* GIFT GAME */
let bigGift = document.getElementById("bigGift");
let cardGrid = document.getElementById("cardGrid");
let rewardBox = document.getElementById("rewardBox");
let rewardText = document.getElementById("rewardText");

bigGift.onclick = ()=>{
  bigGift.style.display = "none";
  cardGrid.style.display = "grid";
  generateCards();
  explodeConfetti();
};

function generateCards(){

  let icons = ["🎆","🎇","🌌","🌠"];

  let rewards = [
    "Bartholomew & Pompompurin 🐱🐰",
    "You make days softer",
    "Sleep well tonight 🌙",
    "I appreciate you",
    "Happy Birthday ❤️"
  ];

  let filler = Array(15).fill("meme 😂");

  let all = [...rewards, ...filler].sort(()=>Math.random()-0.5);

  cardGrid.innerHTML = "";

  all.forEach(text=>{
    let card = document.createElement("div");
    card.className = "card";
    card.innerText = icons[Math.floor(Math.random()*icons.length)];

    card.onclick = ()=>{
      rewardText.innerText = text;
      rewardBox.style.display = "flex";
    };

    cardGrid.appendChild(card);
  });
}

/* ===== ORIGINAL GAME ===== */

function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

function teleport(btn){
  btn.style.left = (Math.random()*70 + 10) + "%";
  btn.style.top = (Math.random()*60 + 20) + "%";
}

function spawnClones(){
  noBtn.style.display = "none";
  clones = [];
  clickCount = 0;

  for(let i=0;i<5;i++){
    let c = document.createElement("button");
    c.className = "choice-btn";
    c.innerText = "NO";

    teleport(c);
    c.onclick = ()=>handleCloneClick(c);

    slide2.appendChild(c);
    clones.push(c);
  }
}

function handleCloneClick(btn){

  if(moving) return;

  btn.remove();
  clones = clones.filter(b=>b!==btn);

  clickCount++;

  if(clickCount === 1) pop("3...");
  if(clickCount === 2) pop("2...");
  if(clickCount === 3) pop("1...");

  if(clickCount === 4){
    pop("Shoon lae thu…( •̀⤙•́ )");
  }

  if(clickCount === 5){

    finalBtn = btn;

    pop("alr fine try catching it then <(ꐦㅍ _ㅍ)>");

    let newBtn = document.createElement("button");
    newBtn.className = "choice-btn";
    newBtn.innerText = "NO";

    teleport(newBtn);
    slide2.appendChild(newBtn);

    startMoving(newBtn);
  }
}

function startMoving(btn){

  moving = true;

  moveInterval = setInterval(()=>{

    let currentLeft = parseFloat(btn.style.left) || 50;
    let currentTop = parseFloat(btn.style.top) || 50;

    let newLeft = currentLeft + (Math.random()*20 - 10);
    let newTop = currentTop + (Math.random()*20 - 10);

    newLeft = Math.max(10, Math.min(80, newLeft));
    newTop = Math.max(20, Math.min(80, newTop));

    btn.style.left = newLeft + "%";
    btn.style.top = newTop + "%";

  },700);

  btn.onclick = ()=>{
    clearInterval(moveInterval);

    pop("that’s it, no more No button for you (ᗒᗣᗕ)");

    btn.remove();

    yesBtn.classList.add("grow");
  };
}

noBtn.onclick = ()=>{

  growYes();
  stage++;

  if(stage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(stage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    spawnClones();
  }
};
function explodeConfetti(){

  let emojis = ["🎉","🎊","✨","🌸","💖","🎀"];

  for(let i=0;i<60;i++){

    let c = document.createElement("div");
    c.className = "confetti";
    c.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    c.style.left = Math.random()*100 + "%";
    c.style.top = "-10%";
    c.style.fontSize = (12 + Math.random()*20) + "px";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),2000);
  }
}
</script>

</body>
</html>
