<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffd6e0;
  font-family: 'Georgia', serif;
  overflow:hidden;
}

.container{
  text-align:center;
}

h1{
  font-size:50px;
  color:#8b0033;
}

button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
  transition:0.3s;
  position:relative;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
}

#noBtn{
  background:#b3003c;
  color:white;
  position:absolute;
}

.popup{
  position:absolute;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px 25px;
  border-radius:15px;
  font-size:20px;
  display:none;
}

/* YES BUTTON GLOW */
.glow{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* EXPLOSION */
.explode{
  animation:boom 0.5s forwards;
}

@keyframes boom{
  0%{transform:scale(1); opacity:1;}
  100%{transform:scale(3); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>happy birthday shoon! 🎂</h1>

  <button id="yesBtn" onclick="goNext()">yes</button>
  <button id="noBtn" onclick="handleNo()">no</button>
</div>

<div class="popup" id="popup"></div>

<script>
let noCount = 0;
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let popup = document.getElementById("popup");

function showPopup(text){
  popup.innerText = text;
  popup.style.display = "block";
  setTimeout(()=> popup.style.display="none",2000);
}

function moveNo(){
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function handleNo(){
  noCount++;

  if(noCount === 1){
    moveNo();
    yesBtn.style.transform="scale(1.5)";
    showPopup("why no?૮(◞ ‸ ◟ )ა");
  }

  else if(noCount === 2){
    moveNo();
    yesBtn.style.transform="scale(2)";
    showPopup("i’ve been preparing this for 20 days(っ╥﹏╥ς)");
  }

  else if(noCount === 3){
    noBtn.classList.add("explode");
    setTimeout(()=> noBtn.style.display="none",500);
    yesBtn.style.transform="scale(2.5)";
    yesBtn.classList.add("glow");
    showPopup("yep im removing that button before you pmoς(≖_≖ )ﾉ🔪");
  }

  else{
    moveNo();
  }
}

function goNext(){
  alert("NEXT SLIDE COMING NEXT STEP 👀");
}
</script>

</body>
</html>
