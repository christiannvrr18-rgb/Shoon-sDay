<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOONSDAY</title>

<style>
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.slide{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

#slide1{background:black;}

.start-btn{
  background:red;
  color:white;
  padding:25px 50px;
  font-size:24px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

#slide2{
  background:#ffd6e0;
  flex-direction:column;
  text-align:center;
  position:relative;
}

#cat{
  width:420px;
  max-width:90%;
}

.choice-btn{
  position:absolute;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

#yesBtn{background:#ff4d6d;color:white;left:40%;top:75%;}
#noBtn{background:#444;color:white;left:55%;top:75%;}

/* SLIDE 3 */

#slide3{
  background:#ffd6e0;
  position:relative;
  overflow:hidden;
}

#gameTitle{
  display:none;
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#giftWrap{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
  z-index:1;
}

#giftText{
  margin-bottom:10px;
}

#bigGift{
  font-size:140px;
  cursor:pointer;
}

#cardGrid{
  display:none;
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  justify-items:center;
  z-index:5;
}

.card{
  width:70px;
  height:70px;
  background:white;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

#rewardBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#rewardContent{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.bg-float{
  position:absolute;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.confetti{
  position:absolute;
  animation:fall 1.8s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music1" src="hotline.mp3"></audio>
<audio id="music2" src="minmhamin.mp3"></audio>
<audio id="finalMusic" src="wings.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <button id="startBtn" class="start-btn">PRESS</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">
  <img src="bdaycat.png" id="cat">
  <h1>Happy Birthday Shoon! 🎂</h1>
  <p>Open your presents?</p>
  <button id="yesBtn" class="choice-btn">YES</button>
  <button id="noBtn" class="choice-btn">NO</button>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  <div id="gameTitle">find your gifts₍₍⚞(˶>ᗜ<˶)⚟⁾⁾</div>

  <div id="giftWrap">
    <div id="giftText">well open it already ৻(  •̀ ᗜ •́  ৻)</div>
    <div id="bigGift">🎁</div>
  </div>

  <div id="cardGrid"></div>
</div>

<!-- REWARD BOX -->
<div id="rewardBox">
  <div id="rewardContent">
    <div id="rewardBody"></div>
    <br>
    <button onclick="closeReward()">OK</button>
  </div>
</div>

<script>
let slide1 = document.getElementById("slide1");
let slide2 = document.getElementById("slide2");
let slide3 = document.getElementById("slide3");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");
let finalMusic = document.getElementById("finalMusic");
let rewardBox = document.getElementById("rewardBox");

let clickCount = 0;
let clones = [];
let moving = false;
let moveInterval = null;
let stage = 0;
let yesScale = 1;

/* START */
document.getElementById("startBtn").onclick = async ()=>{
  slide1.classList.remove("active");
  slide2.classList.add("active");
  try{await music1.play();}catch{}
};

/* YES */
document.getElementById("yesBtn").onclick = async ()=>{
  slide2.classList.remove("active");
  slide3.classList.add("active");

  music1.pause();
  music1.currentTime = 0;

  try{await music2.play();}catch{}
  spawnFloating();
};

/* FLOATING BG */
function spawnFloating(){
  let emojis=["🐱","🐰","🌸","🎀","🎂"];
  setInterval(()=>{
    let e=document.createElement("div");
    e.className="bg-float";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"%";
    e.style.animationDuration=(5+Math.random()*5)+"s";
    slide3.appendChild(e);
    setTimeout(()=>e.remove(),10000);
  },500);
}

/* POPUP */
function pop(text){
  let p=document.createElement("div");
  p.innerText=text;
  p.style.position="absolute";
  p.style.top="10%";
  p.style.left="50%";
  p.style.transform="translateX(-50%)";
  p.style.background="white";
  p.style.padding="10px 20px";
  p.style.borderRadius="10px";
  p.style.zIndex="9999";
  slide2.appendChild(p);
  setTimeout(()=>p.remove(),1500);
}

/* NO BUTTON LOGIC */
document.getElementById("noBtn").onclick = ()=>{
  growYes();
  stage++;

  if(stage === 1){
    pop("why no? ૮(◞ ‸ ◟ )ა");
    teleport(noBtn);
  }

  else if(stage === 2){
    pop("try pressing 5 buttons then (¬_ ´¬ )");
    spawnClones();
  }
};

function growYes(){
  yesScale += 0.25;
  yesBtn.style.transform = `scale(${yesScale})`;
}

function teleport(btn){
  btn.style.left = (Math.random()*70+10)+"%";
  btn.style.top = (Math.random()*60+20)+"%";
}

/* CLONES */
function spawnClones(){
  noBtn.style.display="none";
  clones=[];
  clickCount=0;

  for(let i=0;i<5;i++){
    let c=document.createElement("button");
    c.className="choice-btn";
    c.innerText="NO";
    teleport(c);
    c.onclick=()=>handleCloneClick(c);
    slide2.appendChild(c);
    clones.push(c);
  }
}

function handleCloneClick(btn){
  if(moving) return;

  btn.remove();
  clickCount++;

  if(clickCount===1) pop("3...");
  if(clickCount===2) pop("2...");
  if(clickCount===3) pop("1...");
  if(clickCount===4) pop("Shoon lae thu…");

  if(clickCount===5){
    pop("alr fine try catching it then");
    let finalBtn=document.createElement("button");
    finalBtn.className="choice-btn";
    finalBtn.innerText="NO";
    teleport(finalBtn);
    slide2.appendChild(finalBtn);
    startMoving(finalBtn);
  }
}

function startMoving(btn){
  moving=true;

  moveInterval=setInterval(()=>{
    let x=parseFloat(btn.style.left)||50;
    let y=parseFloat(btn.style.top)||50;

    x+=Math.random()*20-10;
    y+=Math.random()*20-10;

    x=Math.max(10,Math.min(80,x));
    y=Math.max(20,Math.min(80,y));

    btn.style.left=x+"%";
    btn.style.top=y+"%";
  },650);

  btn.onclick=()=>{
    clearInterval(moveInterval);
    pop("that’s it, no more No button for you");
    btn.remove();
    growYes();
  };
}

/* GIFT SYSTEM */
bigGift.onclick=()=>{
  giftWrap.style.display="none";
  gameTitle.style.display="block";
  cardGrid.style.display="grid";
  generateCards();
  explodeConfetti();
};

function generateCards(){
  let icons=["🎆","🎇","🌌","🌠"];

  let gifts=[
    {type:"video",src:"vid1.mp4"},
    {type:"image",src:"img1.jpg"},
    {type:"youtube",src:"https://www.youtube.com/embed/1o00J04ThXQ"},
    {type:"final",text:"happy birthday shoon ❤️"}
  ];

  cardGrid.innerHTML="";

  gifts.forEach(g=>{
    let card=document.createElement("div");
    card.className="card";
    card.innerText=icons[Math.floor(Math.random()*icons.length)];

    card.onclick=()=>{
      card.style.visibility="hidden";
      openGift(g);
    };

    cardGrid.appendChild(card);
  });
}

function openGift(g){
  let body=document.getElementById("rewardBody");

  music2.pause();
  music2.currentTime=0;

  body.innerHTML="";

  if(g.type==="video"){
    body.innerHTML=`<video controls autoplay style="max-width:300px;">
    <source src="${g.src}" type="video/mp4"></video>`;
  }

  else if(g.type==="image"){
    body.innerHTML=`<img src="${g.src}" style="max-width:300px;">`;
  }

  else if(g.type==="youtube"){
    body.innerHTML=`<iframe width="300" height="200" src="${g.src}" frameborder="0" allowfullscreen></iframe>`;
  }

  else if(g.type==="final"){
    finalMusic.play();
    body.innerHTML=`<div>${g.text}</div>`;
  }

  rewardBox.style.display="flex";
}

function closeReward(){
  rewardBox.style.display="none";
  if(finalMusic.paused){
    music2.play();
  }
}

/* CONFETTI */
function explodeConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerText="🎉";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}
</script>

</body>
</html>
